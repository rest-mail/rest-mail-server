# dnsmasq config for the reference mail server stack.
# Provides authoritative DNS for ref.test inside the Docker network.

no-resolv
no-hosts
listen-address=0.0.0.0
log-queries

# A record
address=/mail.ref.test/172.21.0.10
address=/ref.test/172.21.0.10

# MX
mx-host=ref.test,mail.ref.test,10

# PTR (reverse DNS)
ptr-record=10.0.21.172.in-addr.arpa,mail.ref.test

# SPF
txt-record=ref.test,"v=spf1 ip4:172.21.0.10 -all"

# DMARC
txt-record=_dmarc.ref.test,"v=DMARC1; p=none; rua=mailto:postmaster@ref.test"

# Forward non-.test queries upstream
server=8.8.8.8
server=8.8.4.4
