# dnsmasq configuration for rest-mail .test domains
# This provides authoritative DNS for all mail domains in the Docker network

# Don't read /etc/resolv.conf
no-resolv

# Don't read /etc/hosts
no-hosts

# Listen on all interfaces
listen-address=0.0.0.0

# Log queries for debugging
log-queries
log-facility=-

# A records - map domain names to container IPs
address=/mail1.test/10.99.0.11
address=/mail2.test/10.99.0.12
address=/mail3.test/10.99.0.13
address=/postgres-mail1/10.99.0.41
address=/postgres-mail2/10.99.0.42
address=/postgres-mail3/10.99.0.43
address=/api/10.99.0.20

# MX records - where to deliver mail for each domain
mx-host=mail1.test,mail1.test,10
mx-host=mail2.test,mail2.test,10
mx-host=mail3.test,mail3.test,10

# PTR records - reverse DNS (critical for mail deliverability)
ptr-record=11.0.20.172.in-addr.arpa,mail1.test
ptr-record=12.0.20.172.in-addr.arpa,mail2.test
ptr-record=13.0.20.172.in-addr.arpa,mail3.test

# SPF records
txt-record=mail1.test,"v=spf1 ip4:10.99.0.11 -all"
txt-record=mail2.test,"v=spf1 ip4:10.99.0.12 -all"
txt-record=mail3.test,"v=spf1 ip4:10.99.0.13 -all"

# DMARC records
txt-record=_dmarc.mail1.test,"v=DMARC1; p=reject; rua=mailto:postmaster@mail1.test"
txt-record=_dmarc.mail2.test,"v=DMARC1; p=reject; rua=mailto:postmaster@mail2.test"
txt-record=_dmarc.mail3.test,"v=DMARC1; p=reject; rua=mailto:postmaster@mail3.test"

# Autoconfig/Autodiscover records
# Mozilla autoconfig: autoconfig.domain → API server
address=/autoconfig.mail1.test/10.99.0.20
address=/autoconfig.mail2.test/10.99.0.20
address=/autoconfig.mail3.test/10.99.0.20

# Microsoft autodiscover: autodiscover.domain → API server
address=/autodiscover.mail1.test/10.99.0.20
address=/autodiscover.mail2.test/10.99.0.20
address=/autodiscover.mail3.test/10.99.0.20

# SRV records for email client auto-discovery
# IMAP
srv-host=_imap._tcp.mail1.test,mail1.test,143,0,5
srv-host=_imap._tcp.mail2.test,mail2.test,143,0,5
srv-host=_imap._tcp.mail3.test,mail3.test,143,0,5
srv-host=_imaps._tcp.mail1.test,mail1.test,993,0,5
srv-host=_imaps._tcp.mail2.test,mail2.test,993,0,5
srv-host=_imaps._tcp.mail3.test,mail3.test,993,0,5

# POP3
srv-host=_pop3._tcp.mail1.test,mail1.test,110,0,5
srv-host=_pop3._tcp.mail2.test,mail2.test,110,0,5
srv-host=_pop3._tcp.mail3.test,mail3.test,110,0,5
srv-host=_pop3s._tcp.mail1.test,mail1.test,995,0,5
srv-host=_pop3s._tcp.mail2.test,mail2.test,995,0,5
srv-host=_pop3s._tcp.mail3.test,mail3.test,995,0,5

# SMTP submission
srv-host=_submission._tcp.mail1.test,mail1.test,587,0,5
srv-host=_submission._tcp.mail2.test,mail2.test,587,0,5
srv-host=_submission._tcp.mail3.test,mail3.test,587,0,5

# MTA-STS (RFC 8461) - policy announcement
txt-record=_mta-sts.mail1.test,"v=STSv1; id=20260218"
txt-record=_mta-sts.mail2.test,"v=STSv1; id=20260218"
txt-record=_mta-sts.mail3.test,"v=STSv1; id=20260218"

# TLS-RPT (RFC 8460) - TLS reporting
txt-record=_smtp._tls.mail1.test,"v=TLSRPTv1; rua=mailto:tls-reports@mail1.test"
txt-record=_smtp._tls.mail2.test,"v=TLSRPTv1; rua=mailto:tls-reports@mail2.test"
txt-record=_smtp._tls.mail3.test,"v=TLSRPTv1; rua=mailto:tls-reports@mail3.test"

# MTA-STS web server (serves /.well-known/mta-sts.txt via API)
address=/mta-sts.mail1.test/10.99.0.20
address=/mta-sts.mail2.test/10.99.0.20
address=/mta-sts.mail3.test/10.99.0.20

# Forward non-.test queries to upstream DNS
server=8.8.8.8
server=8.8.4.4
