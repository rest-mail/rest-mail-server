version: "3"

# rest-mail/tasks/postgres — Taskfile
#
# Drives the postgres container via plain `docker run` (no compose).
# Included by the main Taskfile under namespace `postgres`.
#
# Joins the testbed's mailnet network at a static IP so peers can reach it
# by name. Data lives in a named volume so the container can be recreated
# without losing state. `reset` is the only destructive task.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task postgres:up).

silent: true

vars:
  POSTGRES_PROJECT: '{{.POSTGRES_PROJECT | default "rest-mail"}}'
  POSTGRES_NETWORK: '{{.POSTGRES_NETWORK | default "testbed_mailnet"}}'
  POSTGRES_IP: '{{.POSTGRES_IP | default "10.99.0.43"}}'
  POSTGRES_DB_NAME: '{{.POSTGRES_DB_NAME | default "restmail"}}'
  POSTGRES_DB_USER: '{{.POSTGRES_DB_USER | default "restmail"}}'
  POSTGRES_DB_PASS: '{{.POSTGRES_DB_PASS | default "restmail"}}'
  POSTGRES_REGISTRY: '{{.POSTGRES_REGISTRY | default "ghcr.io/rest-mail"}}'
  POSTGRES_UPSTREAM_IMAGE: '{{.POSTGRES_UPSTREAM_IMAGE | default "postgres:16-alpine"}}'
  POSTGRES_IMAGE: '{{.POSTGRES_REGISTRY}}/postgres:16-alpine'
  POSTGRES_CONTAINER_NAME: '{{.POSTGRES_PROJECT}}-postgres'
  POSTGRES_DATA_VOLUME: '{{.POSTGRES_PROJECT}}-postgres-data'

tasks:

  # ════════════════════════════════════════════════════════
  # up / down / restart
  # ════════════════════════════════════════════════════════

  up:
    desc: Start postgres (creates data volume if missing; recreates container)
    cmds:
      - |
        if docker volume inspect {{.POSTGRES_DATA_VOLUME}} >/dev/null 2>&1; then
          [ -n "$VERBOSE" ] && echo "  volume {{.POSTGRES_DATA_VOLUME}} already exists" || true
        else
          echo "  creating volume {{.POSTGRES_DATA_VOLUME}}"
          docker volume create {{.POSTGRES_DATA_VOLUME}} >$OUTPUT 2>&1
        fi
      - |
        # Pull upstream and retag locally so the image name matches the
        # FQDN convention (ghcr.io/rest-mail/postgres:16-alpine). Idempotent.
        if ! docker image inspect {{.POSTGRES_IMAGE}} >/dev/null 2>&1; then
          echo "  pulling {{.POSTGRES_UPSTREAM_IMAGE}} and tagging as {{.POSTGRES_IMAGE}}"
          docker pull {{.POSTGRES_UPSTREAM_IMAGE}} >$OUTPUT 2>&1
          docker tag {{.POSTGRES_UPSTREAM_IMAGE}} {{.POSTGRES_IMAGE}}
        fi
      - |
        echo "  starting postgres ({{.POSTGRES_CONTAINER_NAME}} @ {{.POSTGRES_IP}})"
        docker rm -f {{.POSTGRES_CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.POSTGRES_CONTAINER_NAME}} \
          --restart unless-stopped \
          --network {{.POSTGRES_NETWORK}} \
          --ip {{.POSTGRES_IP}} \
          -e POSTGRES_DB={{.POSTGRES_DB_NAME}} \
          -e POSTGRES_USER={{.POSTGRES_DB_USER}} \
          -e POSTGRES_PASSWORD={{.POSTGRES_DB_PASS}} \
          -v {{.POSTGRES_DATA_VOLUME}}:/var/lib/postgresql/data \
          --health-cmd 'pg_isready -U {{.POSTGRES_DB_USER}}' \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5 \
          {{.POSTGRES_IMAGE}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove postgres (preserves the data volume)
    cmds:
      - |
        if docker ps -aq --filter "name=^/{{.POSTGRES_CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.POSTGRES_CONTAINER_NAME}}"
          docker rm -f {{.POSTGRES_CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.POSTGRES_CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the postgres container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail postgres logs
    cmds:
      - docker logs -f --tail=100 {{.POSTGRES_CONTAINER_NAME}}

  psql:
    desc: Open an interactive psql shell inside postgres
    cmds:
      - docker exec -it {{.POSTGRES_CONTAINER_NAME}} psql -U {{.POSTGRES_DB_USER}} -d {{.POSTGRES_DB_NAME}}

  # ════════════════════════════════════════════════════════
  # Destructive
  # ════════════════════════════════════════════════════════

  reset:
    desc: Drop the data volume and recreate the container (destructive — drops all data)
    cmds:
      - task: down
      - |
        if docker volume inspect {{.POSTGRES_DATA_VOLUME}} >/dev/null 2>&1; then
          echo "  removing volume {{.POSTGRES_DATA_VOLUME}}"
          docker volume rm -f {{.POSTGRES_DATA_VOLUME}} >$OUTPUT 2>&1
        fi
      - task: up
