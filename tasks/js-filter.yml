version: "3"

# rest-mail/tasks/js-filter — Taskfile fragment
#
# Drives the js-filter sidecar container via plain `docker run`.
# Included by the main Taskfile under namespace `js-filter`.
#
# Paths inside this file are relative to the file's own dir; when included
# from the project root (`dir: ../`) `BUILD_CONTEXT` resolves correctly.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task js-filter:up).

silent: true

vars:
  JS_FILTER_PROJECT: '{{.JS_FILTER_PROJECT | default "rest-mail"}}'
  JS_FILTER_NETWORK: '{{.JS_FILTER_NETWORK | default "testbed_mailnet"}}'
  JS_FILTER_IP: '{{.JS_FILTER_IP | default "10.99.0.22"}}'
  JS_FILTER_IMAGE_TAG: '{{.JS_FILTER_IMAGE_TAG | default "dev"}}'
  JS_FILTER_CONTAINER_NAME: '{{.JS_FILTER_PROJECT}}-js-filter'
  JS_FILTER_REGISTRY: '{{.JS_FILTER_REGISTRY | default "ghcr.io/rest-mail"}}'
  JS_FILTER_IMAGE: '{{.JS_FILTER_REGISTRY}}/js-filter:{{.JS_FILTER_IMAGE_TAG}}'
  JS_FILTER_BUILD_CONTEXT: '{{.JS_FILTER_BUILD_CONTEXT | default "./docker/js-filter-sidecar"}}'

tasks:

  # ════════════════════════════════════════════════════════
  # build / up / down / restart
  # ════════════════════════════════════════════════════════

  build:
    desc: Build the js-filter sidecar image
    cmds:
      - |
        echo "  building {{.JS_FILTER_IMAGE}} from {{.JS_FILTER_BUILD_CONTEXT}}"
        docker build -t {{.JS_FILTER_IMAGE}} {{.JS_FILTER_BUILD_CONTEXT}} >$OUTPUT 2>&1

  up:
    desc: Start (or recreate) the js-filter sidecar container
    deps: [build]
    cmds:
      - |
        echo "  starting js-filter ({{.JS_FILTER_CONTAINER_NAME}} @ {{.JS_FILTER_IP}})"
        docker rm -f {{.JS_FILTER_CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.JS_FILTER_CONTAINER_NAME}} \
          --restart unless-stopped \
          --network {{.JS_FILTER_NETWORK}} \
          --ip {{.JS_FILTER_IP}} \
          --health-cmd 'nc -z localhost 3100 || exit 1' \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 3 \
          {{.JS_FILTER_IMAGE}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove the js-filter sidecar container (no-op if not running)
    cmds:
      - |
        if docker ps -aq --filter "name=^/{{.JS_FILTER_CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.JS_FILTER_CONTAINER_NAME}}"
          docker rm -f {{.JS_FILTER_CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.JS_FILTER_CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the js-filter sidecar container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail js-filter sidecar logs
    cmds:
      - docker logs -f --tail=100 {{.JS_FILTER_CONTAINER_NAME}}
