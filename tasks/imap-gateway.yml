version: "3"

# rest-mail/tasks/imap-gateway — Taskfile fragment
#
# Drives the IMAP gateway container via plain `docker run` (no compose).
# Included by the main Taskfile under namespace `imap-gateway`.
#
# Joins the testbed's mailnet network at a static IP, uses the testbed's
# dnsmasq for DNS, and mounts the testbed certs volume read-only.
# In dev mode (default) the source tree is bind-mounted for air hot reload.
#
# The 993 (imaps) port is published via docker-proxy labels rather than a
# host -p mapping; only 143 is exposed directly on the host.
#
# Output is friendly by default. Re-run with VERBOSE=1 to see the raw
# docker / shell output (e.g. VERBOSE=1 task imap-gateway:up).

silent: true

vars:
  IMAP_GATEWAY_PROJECT: '{{.IMAP_GATEWAY_PROJECT | default "rest-mail"}}'
  IMAP_GATEWAY_NETWORK: '{{.IMAP_GATEWAY_NETWORK | default "testbed_mailnet"}}'
  IMAP_GATEWAY_CERTS_VOLUME: '{{.IMAP_GATEWAY_CERTS_VOLUME | default "testbed_certs"}}'
  IMAP_GATEWAY_DNS_IP: '{{.IMAP_GATEWAY_DNS_IP | default "10.99.0.10"}}'
  IMAP_GATEWAY_IP: '{{.IMAP_GATEWAY_IP | default "10.99.0.15"}}'
  IMAP_GATEWAY_MAIL3_HOSTNAME: '{{.IMAP_GATEWAY_MAIL3_HOSTNAME | default "mail3.test"}}'
  IMAP_GATEWAY_MODE: '{{.IMAP_GATEWAY_MODE | default "dev"}}'
  IMAP_GATEWAY_IMAGE_TAG: '{{.IMAP_GATEWAY_IMAGE_TAG | default "dev"}}'
  IMAP_GATEWAY_REGISTRY: '{{.IMAP_GATEWAY_REGISTRY | default "ghcr.io/rest-mail"}}'
  IMAP_GATEWAY_IMAGE: '{{.IMAP_GATEWAY_REGISTRY}}/imap-gateway:{{.IMAP_GATEWAY_IMAGE_TAG}}'
  IMAP_GATEWAY_CONTAINER_NAME: '{{.IMAP_GATEWAY_PROJECT}}-imap-gateway'
  IMAP_GATEWAY_LOGS_VOLUME: '{{.IMAP_GATEWAY_PROJECT}}-gateway-logs'
  IMAP_GATEWAY_API_BASE_URL: '{{.IMAP_GATEWAY_API_BASE_URL | default (printf "http://%s-api:8080" .IMAP_GATEWAY_PROJECT)}}'
  IMAP_GATEWAY_DB_HOST: '{{.IMAP_GATEWAY_DB_HOST | default (printf "%s-postgres" .IMAP_GATEWAY_PROJECT)}}'
  IMAP_GATEWAY_DB_PORT: '{{.IMAP_GATEWAY_DB_PORT | default "5432"}}'
  IMAP_GATEWAY_DB_NAME: '{{.IMAP_GATEWAY_DB_NAME | default "restmail"}}'
  IMAP_GATEWAY_DB_USER: '{{.IMAP_GATEWAY_DB_USER | default "restmail"}}'
  IMAP_GATEWAY_DB_PASS: '{{.IMAP_GATEWAY_DB_PASS | default "restmail"}}'
  IMAP_GATEWAY_TLS_CERT_PATH: '{{.IMAP_GATEWAY_TLS_CERT_PATH | default "/certs/mail3.test.crt"}}'
  IMAP_GATEWAY_TLS_KEY_PATH: '{{.IMAP_GATEWAY_TLS_KEY_PATH | default "/certs/mail3.test.key"}}'
  IMAP_GATEWAY_PORT: '{{.IMAP_GATEWAY_PORT | default "143"}}'
  IMAP_GATEWAY_TLS_PORT: '{{.IMAP_GATEWAY_TLS_PORT | default "993"}}'
  IMAP_GATEWAY_LOG_LEVEL: '{{.IMAP_GATEWAY_LOG_LEVEL | default "debug"}}'
  IMAP_GATEWAY_ENVIRONMENT: '{{.IMAP_GATEWAY_ENVIRONMENT | default "development"}}'
  IMAP_GATEWAY_PROXY_HOST: '{{.IMAP_GATEWAY_PROXY_HOST | default "restmail.localhost"}}'

tasks:

  # ════════════════════════════════════════════════════════
  # build / up / down / restart
  # ════════════════════════════════════════════════════════

  build:
    desc: Build the imap-gateway image (target controlled by MODE — dev|prod)
    cmds:
      - |
        echo "  building {{.IMAP_GATEWAY_IMAGE}} (target={{.IMAP_GATEWAY_MODE}})"
        docker build -t {{.IMAP_GATEWAY_IMAGE}} --target {{.IMAP_GATEWAY_MODE}} -f projects/imap-gateway/Dockerfile . >$OUTPUT 2>&1

  up:
    desc: Start (or recreate) the imap-gateway container
    deps: [build]
    cmds:
      - |
        if docker volume inspect {{.IMAP_GATEWAY_LOGS_VOLUME}} >/dev/null 2>&1; then
          [ -n "$VERBOSE" ] && echo "  volume {{.IMAP_GATEWAY_LOGS_VOLUME}} already exists" || true
        else
          echo "  creating volume {{.IMAP_GATEWAY_LOGS_VOLUME}}"
          docker volume create {{.IMAP_GATEWAY_LOGS_VOLUME}} >$OUTPUT 2>&1
        fi
      - |
        echo "  starting imap-gateway ({{.IMAP_GATEWAY_CONTAINER_NAME}} @ {{.IMAP_GATEWAY_IP}}, mode={{.IMAP_GATEWAY_MODE}})"
        DEV_MOUNTS=""
        if [ "{{.IMAP_GATEWAY_MODE}}" = "dev" ]; then
          DEV_MOUNTS="-v $(pwd):/app -v /app/tmp"
        fi
        docker rm -f {{.IMAP_GATEWAY_CONTAINER_NAME}} >$OUTPUT 2>&1 || true
        docker run -d --name {{.IMAP_GATEWAY_CONTAINER_NAME}} \
          --hostname {{.IMAP_GATEWAY_MAIL3_HOSTNAME}} \
          --restart unless-stopped \
          --network {{.IMAP_GATEWAY_NETWORK}} \
          --ip {{.IMAP_GATEWAY_IP}} \
          --dns {{.IMAP_GATEWAY_DNS_IP}} \
          -p {{.IMAP_GATEWAY_PORT}}:{{.IMAP_GATEWAY_PORT}} \
          -l docker-proxy.imaps.proto=tcp \
          -l docker-proxy.imaps.port={{.IMAP_GATEWAY_TLS_PORT}} \
          -l docker-proxy.imaps.host={{.IMAP_GATEWAY_PROXY_HOST}} \
          -e GATEWAY_HOSTNAME={{.IMAP_GATEWAY_MAIL3_HOSTNAME}} \
          -e API_BASE_URL={{.IMAP_GATEWAY_API_BASE_URL}} \
          -e DB_HOST={{.IMAP_GATEWAY_DB_HOST}} \
          -e DB_PORT={{.IMAP_GATEWAY_DB_PORT}} \
          -e DB_NAME={{.IMAP_GATEWAY_DB_NAME}} \
          -e DB_USER={{.IMAP_GATEWAY_DB_USER}} \
          -e DB_PASS={{.IMAP_GATEWAY_DB_PASS}} \
          -e TLS_CERT_PATH={{.IMAP_GATEWAY_TLS_CERT_PATH}} \
          -e TLS_KEY_PATH={{.IMAP_GATEWAY_TLS_KEY_PATH}} \
          -e IMAP_PORT={{.IMAP_GATEWAY_PORT}} \
          -e IMAP_TLS_PORT={{.IMAP_GATEWAY_TLS_PORT}} \
          -e LOG_LEVEL={{.IMAP_GATEWAY_LOG_LEVEL}} \
          -e ENVIRONMENT={{.IMAP_GATEWAY_ENVIRONMENT}} \
          -v {{.IMAP_GATEWAY_CERTS_VOLUME}}:/certs:ro \
          -v {{.IMAP_GATEWAY_LOGS_VOLUME}}:/var/log/restmail \
          $DEV_MOUNTS \
          --health-cmd 'nc -z localhost {{.IMAP_GATEWAY_PORT}}' \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 3 \
          {{.IMAP_GATEWAY_IMAGE}} >$OUTPUT 2>&1

  down:
    desc: Stop and remove the imap-gateway container (no-op if not running)
    cmds:
      - |
        if docker ps -aq --filter "name=^/{{.IMAP_GATEWAY_CONTAINER_NAME}}$" | grep -q .; then
          echo "  stopping {{.IMAP_GATEWAY_CONTAINER_NAME}}"
          docker rm -f {{.IMAP_GATEWAY_CONTAINER_NAME}} >$OUTPUT 2>&1
        else
          echo "  {{.IMAP_GATEWAY_CONTAINER_NAME}} not running"
        fi

  restart:
    desc: Recreate the imap-gateway container
    cmds:
      - task: down
      - task: up

  # ════════════════════════════════════════════════════════
  # Diagnostics
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail imap-gateway logs
    cmds:
      - docker logs -f --tail=100 {{.IMAP_GATEWAY_CONTAINER_NAME}}
