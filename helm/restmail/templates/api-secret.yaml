{{- /*
Render a generated Secret only when no existingSecret is provided.
For production set api.existingSecret to a Secret you manage out-of-band.
The Secret must contain keys: JWT_SECRET, MASTER_KEY.
*/ -}}
{{- if not .Values.api.existingSecret -}}
{{- if and .Values.api.jwtSecret .Values.api.masterKey -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "restmail.componentName" (list . "api") }}
  labels:
    {{- include "restmail.componentLabels" (list . "api") | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.api.jwtSecret | quote }}
  MASTER_KEY: {{ .Values.api.masterKey | quote }}
{{- else -}}
{{- fail "api.existingSecret is empty AND api.jwtSecret / api.masterKey are not set. Provide one or the other." -}}
{{- end -}}
{{- end -}}
