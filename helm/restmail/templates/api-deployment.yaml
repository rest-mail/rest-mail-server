{{- include "restmail.validate" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "restmail.componentName" (list . "api") }}
  labels:
    {{- include "restmail.componentLabels" (list . "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "restmail.componentSelectorLabels" (list . "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "restmail.componentSelectorLabels" (list . "api") | nindent 8 }}
      annotations:
        # Force redeploy when ConfigMap or Secret content changes.
        checksum/configmap: {{ include (print $.Template.BasePath "/api-configmap.yaml") . | sha256sum }}
        {{- if not .Values.api.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/api-secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "restmail.serviceAccountName" . }}
      {{- include "restmail.dnsSpec" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ include "restmail.imageTag" (list . .Values.api.image.tag) }}"
          imagePullPolicy: {{ include "restmail.imagePullPolicy" (list . .Values.api.image.pullPolicy) }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "restmail.componentName" (list . "api") }}
          env:
            {{- include "restmail.dbEnv" . | nindent 12 }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "restmail.api.secretName" . }}
                  key: JWT_SECRET
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "restmail.api.secretName" . }}
                  key: MASTER_KEY
          volumeMounts:
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- if .Values.api.attachments.persistence.enabled }}
            - name: attachments
              mountPath: /attachments
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- if .Values.api.attachments.persistence.enabled }}
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ include "restmail.componentName" (list . "api-attachments") }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
