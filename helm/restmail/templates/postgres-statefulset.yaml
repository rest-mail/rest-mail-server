{{- if .Values.postgres.enabled -}}
{{- include "restmail.validate" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "restmail.componentName" (list . "postgres") }}
  labels:
    {{- include "restmail.componentLabels" (list . "postgres") | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "restmail.componentName" (list . "postgres") }}
  selector:
    matchLabels:
      {{- include "restmail.componentSelectorLabels" (list . "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "restmail.componentSelectorLabels" (list . "postgres") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "restmail.serviceAccountName" . }}
      {{- include "restmail.dnsSpec" . | nindent 6 }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "restmail.postgres.secretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "restmail.postgres.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "restmail.postgres.secretName" . }}
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "restmail.componentName" (list . "postgres-data") }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
