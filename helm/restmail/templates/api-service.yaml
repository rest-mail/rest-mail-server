apiVersion: v1
kind: Service
metadata:
  name: {{ include "restmail.componentName" (list . "api") }}
  labels:
    {{- include "restmail.componentLabels" (list . "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "restmail.componentSelectorLabels" (list . "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
