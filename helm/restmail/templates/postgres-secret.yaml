{{- /*
Render a generated Secret only when no existingSecret was provided.
For production deployments set postgres.existingSecret to the name of a
Secret you manage out-of-band (cert-manager, external-secrets, sealed-
secrets, etc.) and leave postgres.auth.* empty.
*/ -}}
{{- if not .Values.postgres.existingSecret -}}
{{- if and .Values.postgres.auth.username .Values.postgres.auth.password .Values.postgres.auth.database -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "restmail.componentName" (list . "postgres") }}
  labels:
    {{- include "restmail.componentLabels" (list . "postgres") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.postgres.auth.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | quote }}
{{- else -}}
{{- fail "postgres.existingSecret is empty AND postgres.auth.{username,password,database} are not all set. Provide one or the other." -}}
{{- end -}}
{{- end -}}
