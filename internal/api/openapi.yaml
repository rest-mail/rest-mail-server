                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLog"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /api/v1/auth/login

  parameters:
    AccountId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Account ID
    MessageId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Message ID
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource ID
    FolderName:
      name: folder
      in: path
      required: true
      schema:
        type: string
      description: Folder name (e.g. INBOX, Sent, Drafts, Trash)

  responses:
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  schemas:
    # ─────────────────────────────────────────────────────────────
    # Common / Wrapper schemas
    # ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: not_found
            message:
              type: string
              example: Resource not found
            details:
              type: object

    ValidationErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: validation_failed
            message:
              type: string
              example: Request body failed validation
            details:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string

    Pagination:
      type: object
      properties:
        cursor:
          type: string
          description: Opaque cursor for the next page
        has_more:
          type: boolean
        total:
          type: integer
          format: int64

    # ─────────────────────────────────────────────────────────────
    # Health
    # ─────────────────────────────────────────────────────────────
    HealthStatus:
      type: object
      required: [status, db]
      properties:
        status:
          type: string
          example: healthy
        db:
          type: string
          example: connected

    # ─────────────────────────────────────────────────────────────
    # Auth
    # ─────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      required: [access_token, expires_in, user]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer
          description: Token lifetime in seconds
        user:
          type: object
          required: [id, email, display_name]
          properties:
            id:
              type: integer
            email:
              type: string
              format: email
            display_name:
              type: string

    RefreshResponse:
      type: object
      required: [access_token, expires_in]
      properties:
        access_token:
          type: string
        expires_in:
          type: integer

    # ─────────────────────────────────────────────────────────────
    # Account
    # ─────────────────────────────────────────────────────────────
    Account:
      type: object
      required: [id, mailbox_id, address, display_name, is_primary]
      properties:
        id:
          type: integer
        mailbox_id:
          type: integer
        address:
          type: string
          format: email
        display_name:
          type: string
        is_primary:
          type: boolean

    LinkAccountRequest:
      type: object
      required: [address, password]
      properties:
        address:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string

    TestConnectionRequest:
      type: object
      required: [address, password]
      properties:
        address:
          type: string
          format: email
        password:
          type: string
          format: password

    TestConnectionResponse:
      type: object
      required: [status, address, display_name]
      properties:
        status:
          type: string
          example: ok
        address:
          type: string
          format: email
        display_name:
          type: string

    # ─────────────────────────────────────────────────────────────
    # Folder
    # ─────────────────────────────────────────────────────────────
    Folder:
      type: object
      required: [name, total, unread]
      properties:
        name:
          type: string
        total:
          type: integer
        unread:
          type: integer

    FolderName:
      type: object
      required: [name]
      properties:
        name:
          type: string

    CreateFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    RenameFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # ─────────────────────────────────────────────────────────────
    # Message
    # ─────────────────────────────────────────────────────────────
    Message:
      type: object
      required: [id, mailbox_id, folder, sender, subject, is_read, is_flagged, is_starred, is_draft, is_deleted, received_at, created_at, updated_at]
      properties:
        id:
          type: integer
        mailbox_id:
          type: integer
        folder:
          type: string
        message_id:
          type: string
          description: RFC 2822 Message-ID header
        in_reply_to:
          type: string
        references:
          type: string
        thread_id:
          type: string
        sender:
          type: string
        sender_name:
          type: string
        recipients_to:
          description: JSON array of recipient objects
          oneOf:
            - type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  name:
                    type: string
            - type: "null"
        recipients_cc:
          description: JSON array of CC recipient objects
          oneOf:
            - type: array
              items:
                type: object
                properties:
                  address:
                    type: string
                  name:
                    type: string
            - type: "null"
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        headers:
          description: Raw email headers as JSON
          oneOf:
            - type: object
            - type: "null"
        size_bytes:
          type: integer
        has_attachments:
          type: boolean
        is_read:
          type: boolean
        is_flagged:
          type: boolean
        is_starred:
          type: boolean
        is_draft:
          type: boolean
        is_deleted:
          type: boolean
        received_at:
          type: string
          format: date-time
        date_header:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateMessageRequest:
      type: object
      properties:
        is_read:
          type: boolean
        is_flagged:
          type: boolean
        is_starred:
          type: boolean
        folder:
          type: string

    SendMessageRequest:
      type: object
      required: [from, to, subject]
      properties:
        from:
          type: string
          format: email
        to:
          type: array
          items:
            type: string
            format: email
        cc:
          type: array
          items:
            type: string
            format: email
        bcc:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        in_reply_to:
          type: string

    ForwardMessageRequest:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          format: email
        to:
          type: array
          items:
            type: string
            format: email
        body_text:
          type: string

    # ─────────────────────────────────────────────────────────────
    # Draft
    # ─────────────────────────────────────────────────────────────
    DraftRequest:
      type: object
      required: [from]
      properties:
        from:
          type: string
          format: email
        to:
          type: array
          items:
            type: string
            format: email
        cc:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        in_reply_to:
          type: string
        references:
          type: string

    UpdateDraftRequest:
      type: object
      properties:
        from:
          type: string
          format: email
        to:
          type: array
          items:
            type: string
            format: email
        cc:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string

    # ─────────────────────────────────────────────────────────────
    # Quota
    # ─────────────────────────────────────────────────────────────
    QuotaInfo:
      type: object
      required: [quota_bytes, quota_used_bytes, message_count, percent_used]
      properties:
        quota_bytes:
          type: integer
          format: int64
        quota_used_bytes:
          type: integer
          format: int64
        message_count:
          type: integer
        percent_used:
          type: number
          format: float

    # ─────────────────────────────────────────────────────────────
    # Attachment
    # ─────────────────────────────────────────────────────────────
    Attachment:
      type: object
      required: [id, message_id, filename, content_type, size_bytes, storage_type, storage_ref, checksum, created_at]
      properties:
        id:
          type: integer
        message_id:
          type: integer
        filename:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        storage_type:
          type: string
          enum: [filesystem, s3]
        storage_ref:
          type: string
        checksum:
          type: string
          description: SHA-256 hex digest
        created_at:
          type: string
          format: date-time

    # ─────────────────────────────────────────────────────────────
    # Contact
    # ─────────────────────────────────────────────────────────────
    Contact:
      type: object
      required: [id, mailbox_id, email, name, trust_level, source, created_at, updated_at]
      properties:
        id:
          type: integer
        mailbox_id:
          type: integer
        email:
          type: string
          format: email
        name:
          type: string
        trust_level:
          type: string
          enum: [auto, trusted, blocked]
        source:
          type: string
          enum: [sent, manual, import]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateContactRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        trust_level:
          type: string
          enum: [auto, trusted, blocked]

    UpdateContactRequest:
      type: object
      properties:
        name:
          type: string
        trust_level:
          type: string
          enum: [auto, trusted, blocked]

    ImportContactsRequest:
      type: object
      required: [contacts]
      properties:
        contacts:
          type: array
          items:
            type: object
            required: [email]
            properties:
              email:
                type: string
                format: email
              name:
                type: string

    # ─────────────────────────────────────────────────────────────
    # Vacation
    # ─────────────────────────────────────────────────────────────
    VacationConfig:
      type: object
      required: [enabled, subject, body]
      properties:
        enabled:
          type: boolean
        subject:
          type: string
        body:
          type: string
        start_date:
          type: string
          format: date-time
          nullable: true
        end_date:
          type: string
          format: date-time
          nullable: true

    # ─────────────────────────────────────────────────────────────
    # Sieve
    # ─────────────────────────────────────────────────────────────
    SieveScript:
      type: object
      required: [id, mailbox_id, script, active, created_at, updated_at]
      properties:
        id:
          type: integer
        mailbox_id:
          type: integer
        script:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PutSieveRequest:
      type: object
      required: [script]
      properties:
        script:
          type: string
        active:
          type: boolean

    # ─────────────────────────────────────────────────────────────
    # Quarantine
    # ─────────────────────────────────────────────────────────────
    Quarantine:
      type: object
      required: [id, mailbox_id, sender, subject, body_preview, quarantine_reason, received_at, expires_at, released]
      properties:
        id:
          type: integer
        mailbox_id:
          type: integer
        sender:
          type: string
        subject:
          type: string
        body_preview:
          type: string
        spam_score:
          type: number
          format: float
          nullable: true
        quarantine_reason:
          type: string
        received_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        released:
          type: boolean

    # ─────────────────────────────────────────────────────────────
    # Inbound / Gateway
    # ─────────────────────────────────────────────────────────────
    MailboxCheck:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
        mailbox_id:
          type: integer
        address:
          type: string
          format: email

    DeliverMessageRequest:
      type: object
      required: [address, sender]
      properties:
        address:
          type: string
          format: email
          description: Recipient address
        sender:
          type: string
          format: email
        sender_name:
          type: string
        recipients_to:
          type: array
          items:
            type: string
            format: email
        recipients_cc:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        message_id:
          type: string
        in_reply_to:
          type: string
        references:
          type: string
        raw_message:
          type: string
          description: Full RFC 2822 raw message
        client_ip:
          type: string
        helo_name:
          type: string

    # ─────────────────────────────────────────────────────────────
    # RESTMAIL Protocol
    # ─────────────────────────────────────────────────────────────
    RestmailCapabilities:
      type: object
      required: [protocol, version, features]
      properties:
        protocol:
          type: string
          example: RESTMAIL
        version:
          type: string
          example: "1.0"
        features:
          type: array
          items:
            type: string

    RestmailMailboxCheck:
      type: object
      required: [exists]
      properties:
        exists:
          type: boolean
        address:
          type: string
          format: email

    RestmailDeliverRequest:
      type: object
      required: [to]
      properties:
        from:
          type: string
          format: email
        to:
          type: array
          items:
            type: string
            format: email
        subject:
          type: string
        body_text:
          type: string
        body_html:
          type: string
        message_id:
          type: string
        in_reply_to:
          type: string
        references:
          type: string
        headers:
          type: object
          description: Raw headers as JSON
        raw_message:
          type: string
          description: Full RFC 2822 raw message
        sender:
          type: string
          format: email
          description: Alias for 'from'
        recipients:
          type: array
          items:
            type: string
            format: email
          description: Alias for 'to'

    RestmailDeliverResponse:
      type: object
      required: [delivered, failed]
      properties:
        delivered:
          type: array
          items:
            type: string
            format: email
        failed:
          type: array
          items:
            type: string
            format: email

    # ─────────────────────────────────────────────────────────────
    # Domain
    # ─────────────────────────────────────────────────────────────
    Domain:
      type: object
      required: [id, name, server_type, active, default_quota_bytes, created_at, updated_at]
      properties:
        id:
          type: integer
        name:
          type: string
        server_type:
          type: string
          enum: [traditional, restmail]
        active:
          type: boolean
        default_quota_bytes:
          type: integer
          format: int64
        dkim_selector:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDomainRequest:
      type: object
      required: [name, server_type]
      properties:
        name:
          type: string
        server_type:
          type: string
          enum: [traditional, restmail]
        default_quota_bytes:
          type: integer
          format: int64

    UpdateDomainRequest:
      type: object
      properties:
        active:
          type: boolean
        default_quota_bytes:
          type: integer
          format: int64

    # ─────────────────────────────────────────────────────────────
    # Mailbox
    # ─────────────────────────────────────────────────────────────
    Mailbox:
      type: object
      required: [id, domain_id, local_part, address, display_name, quota_bytes, quota_used_bytes, active, created_at, updated_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        local_part:
          type: string
        address:
          type: string
          format: email
        display_name:
          type: string
        quota_bytes:
          type: integer
          format: int64
        quota_used_bytes:
          type: integer
          format: int64
        active:
          type: boolean
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMailboxRequest:
      type: object
      required: [address, password]
      properties:
        address:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string
        quota_bytes:
          type: integer
          format: int64

    UpdateMailboxRequest:
      type: object
      properties:
        password:
          type: string
          format: password
        display_name:
          type: string
        quota_bytes:
          type: integer
          format: int64
        active:
          type: boolean

    # ─────────────────────────────────────────────────────────────
    # Alias
    # ─────────────────────────────────────────────────────────────
    Alias:
      type: object
      required: [id, domain_id, source_address, destination_address, active, created_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        source_address:
          type: string
          format: email
        destination_address:
          type: string
          format: email
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateAliasRequest:
      type: object
      required: [source_address, destination_address]
      properties:
        source_address:
          type: string
          format: email
        destination_address:
          type: string
          format: email

    UpdateAliasRequest:
      type: object
      properties:
        destination_address:
          type: string
          format: email
        active:
          type: boolean

    # ─────────────────────────────────────────────────────────────
    # WebmailAccount
    # ─────────────────────────────────────────────────────────────
    WebmailAccount:
      type: object
      required: [id, primary_mailbox_id, is_admin, created_at, updated_at]
      properties:
        id:
          type: integer
        primary_mailbox_id:
          type: integer
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ─────────────────────────────────────────────────────────────
    # Pipeline
    # ─────────────────────────────────────────────────────────────
    Pipeline:
      type: object
      required: [id, domain_id, direction, filters, active, created_at, updated_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        direction:
          type: string
          enum: [inbound, outbound]
        filters:
          description: Ordered array of filter configurations
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              config:
                type: object
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePipelineRequest:
      type: object
      required: [domain_id, direction, filters]
      properties:
        domain_id:
          type: integer
        direction:
          type: string
          enum: [inbound, outbound]
        filters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              config:
                type: object
        active:
          type: boolean
          default: true

    UpdatePipelineRequest:
      type: object
      properties:
        filters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              config:
                type: object
        active:
          type: boolean

    PipelineLog:
      type: object
      required: [id, pipeline_id, direction, action, steps, duration_ms, created_at]
      properties:
        id:
          type: integer
        pipeline_id:
          type: integer
        message_id:
          type: integer
          nullable: true
        direction:
          type: string
          enum: [inbound, outbound]
        action:
          type: string
          enum: [continue, reject, quarantine, discard]
        steps:
          type: array
          items:
            type: object
            description: Individual filter execution step
        duration_ms:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time

    TestPipelineRequest:
      type: object
      required: [pipeline_id, email]
      properties:
        pipeline_id:
          type: integer
        email:
          type: object
          description: Sample email JSON for testing

    TestFilterRequest:
      type: object
      required: [filter_name, config, email]
      properties:
        filter_name:
          type: string
        config:
          type: object
        email:
          type: object
          description: Sample email JSON for testing

    ExecutionResult:
      type: object
      required: [final_action, steps, duration_ms]
      properties:
        final_action:
          type: string
          enum: [continue, reject, quarantine, discard]
        steps:
          type: array
          items:
            type: object
        duration_ms:
          type: integer
          format: int64
        final_email:
          type: object
          description: The email after all transformations

    FilterResult:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [continue, reject, quarantine, discard]
        email:
          type: object
          description: The email after filter transformation
        metadata:
          type: object

    # ─────────────────────────────────────────────────────────────
    # Custom Filter
    # ─────────────────────────────────────────────────────────────
    CustomFilter:
      type: object
      required: [id, domain_id, name, filter_type, direction, config, enabled, created_at, updated_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        name:
          type: string
        description:
          type: string
        filter_type:
          type: string
          enum: [action, transform]
        direction:
          type: string
          enum: [inbound, outbound, both]
        config:
          type: object
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCustomFilterRequest:
      type: object
      required: [domain_id, name, filter_type, direction, config]
      properties:
        domain_id:
          type: integer
        name:
          type: string
        description:
          type: string
        filter_type:
          type: string
          enum: [action, transform]
        direction:
          type: string
          enum: [inbound, outbound, both]
        config:
          type: object
        enabled:
          type: boolean
          default: true

    # ─────────────────────────────────────────────────────────────
    # Outbound Queue
    # ─────────────────────────────────────────────────────────────
    OutboundQueue:
      type: object
      required: [id, sender, recipient, domain, status, attempts, next_attempt, max_retries, created_at, expires_at]
      properties:
        id:
          type: integer
        message_id:
          type: integer
          nullable: true
        sender:
          type: string
        recipient:
          type: string
        domain:
          type: string
        status:
          type: string
          enum: [pending, delivering, deferred, delivered, bounced, expired]
        attempts:
          type: integer
        last_attempt:
          type: string
          format: date-time
          nullable: true
        next_attempt:
          type: string
          format: date-time
        last_error:
          type: string
        last_error_code:
          type: integer
        max_retries:
          type: integer
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    QueueStats:
      type: object
      required: [pending, deferred, delivered, bounced, total]
      properties:
        pending:
          type: integer
        deferred:
          type: integer
        delivered:
          type: integer
        bounced:
          type: integer
        total:
          type: integer

    BulkQueueRequest:
      type: object
      properties:
        ids:
          type: array
          items:
            type: integer
        filter:
          type: object
          description: Filter criteria to select entries (alternative to ids)
          properties:
            status:
              type: string
            domain:
              type: string
            sender:
              type: string
            recipient:
              type: string

    BulkQueueResponse:
      type: object
      required: [affected]
      properties:
        affected:
          type: integer

    # ─────────────────────────────────────────────────────────────
    # Sender Rules
    # ─────────────────────────────────────────────────────────────
    DomainSenderRule:
      type: object
      required: [id, domain_id, pattern, list_type, created_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        pattern:
          type: string
          description: Email address or @domain pattern
        list_type:
          type: string
          enum: [allow, block]
        reason:
          type: string
        created_by:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateSenderRuleRequest:
      type: object
      required: [pattern]
      properties:
        pattern:
          type: string
          description: "Email address (spam@evil.com) or domain pattern (@evil.com)"
        reason:
          type: string

    # ─────────────────────────────────────────────────────────────
    # DKIM
    # ─────────────────────────────────────────────────────────────
    DKIMEntry:
      type: object
      required: [domain_id, domain, selector, has_key]
      properties:
        domain_id:
          type: integer
        domain:
          type: string
        selector:
          type: string
        has_key:
          type: boolean

    SetDKIMKeyRequest:
      type: object
      required: [selector, private_key]
      properties:
        selector:
          type: string
        private_key:
          type: string
          description: PEM-encoded RSA private key

    # ─────────────────────────────────────────────────────────────
    # Certificate
    # ─────────────────────────────────────────────────────────────
    Certificate:
      type: object
      required: [id, domain_id, issuer, not_before, not_after, auto_renew, created_at, updated_at]
      properties:
        id:
          type: integer
        domain_id:
          type: integer
        issuer:
          type: string
        not_before:
          type: string
          format: date-time
        not_after:
          type: string
          format: date-time
        auto_renew:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CertificateDetail:
      allOf:
        - $ref: "#/components/schemas/Certificate"
        - type: object
          required: [cert_pem]
          properties:
            cert_pem:
              type: string
              description: PEM-encoded certificate

    CreateCertificateRequest:
      type: object
      required: [domain_id, cert_pem, key_pem]
      properties:
        domain_id:
          type: integer
        cert_pem:
          type: string
          description: PEM-encoded certificate
        key_pem:
          type: string
          description: PEM-encoded private key
        auto_renew:
          type: boolean

    # ─────────────────────────────────────────────────────────────
    # Ban
    # ─────────────────────────────────────────────────────────────
    Ban:
      type: object
      required: [id, ip, reason, protocol, created_by, created_at]
      properties:
        id:
          type: integer
        ip:
          type: string
        reason:
          type: string
        protocol:
          type: string
          enum: [smtp, imap, pop3, all]
        created_by:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CreateBanRequest:
      type: object
      required: [ip, protocol, created_by]
      properties:
        ip:
          type: string
        reason:
          type: string
        protocol:
          type: string
          enum: [smtp, imap, pop3, all]
        duration:
          type: string
          description: Duration string (e.g. "24h", "7d"), omit for permanent
        created_by:
          type: string

    # ─────────────────────────────────────────────────────────────
    # Activity Log
    # ─────────────────────────────────────────────────────────────
    ActivityLog:
      type: object
      required: [id, actor, action, resource_type, created_at]
      properties:
        id:
          type: integer
        actor:
          type: string
        action:
          type: string
        resource_type:
          type: string
        resource_id:
          type: integer
          nullable: true
        detail:
          type: string
        metadata:
          type: object
          nullable: true
        ip:
          type: string
        created_at:
          type: string
          format: date-time
