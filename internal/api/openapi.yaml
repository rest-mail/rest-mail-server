openapi: 3.1.0
info:
  title: RestMail API
  version: 1.0.0
  description: >
    RestMail is a modern email platform with REST API access, supporting traditional
    SMTP/IMAP/POP3 gateways and the RESTMAIL server-to-server protocol. This spec
    covers all user-facing, admin, internal gateway, and RESTMAIL endpoints.
  license:
    name: MIT

servers:
  - url: /
    description: Default server

tags:
  - name: Health
    description: Health check (no auth)
  - name: Auth
    description: Authentication (no auth)
  - name: Accounts
    description: Linked mailbox accounts (JWT)
  - name: Folders
    description: Mailbox folders (JWT)
  - name: Messages
    description: Email messages (JWT)
  - name: Drafts
    description: Draft messages (JWT)
  - name: Threads
    description: Message threads (JWT)
  - name: Quota
    description: Mailbox quota (JWT)
  - name: Search
    description: Message search (JWT)
  - name: Attachments
    description: Message attachments (JWT)
  - name: Contacts
    description: Contact management (JWT)
  - name: Vacation
    description: Vacation auto-reply (JWT)
  - name: Sieve
    description: Sieve filter scripts (JWT)
  - name: Quarantine
    description: Quarantined messages (JWT)
  - name: SSE
    description: Server-Sent Events (query param auth)
  - name: Inbound
    description: Internal gateway delivery
  - name: RESTMAIL
    description: RESTMAIL server-to-server protocol (unauthenticated)
  - name: "Admin: Domains"
    description: Domain management (JWT + admin)
  - name: "Admin: Mailboxes"
    description: Mailbox management (JWT + admin)
  - name: "Admin: Aliases"
    description: Alias management (JWT + admin)
  - name: "Admin: Webmail Accounts"
    description: Webmail account management (JWT + admin)
  - name: "Admin: Pipelines"
    description: Pipeline management (JWT + admin)
  - name: "Admin: Custom Filters"
    description: Custom filter management (JWT + admin)
  - name: "Admin: Queue"
    description: Outbound queue management (JWT + admin)
  - name: "Admin: Sender Rules"
    description: Domain allow/block lists (JWT + admin)
  - name: "Admin: DKIM"
    description: DKIM key management (JWT + admin)
  - name: "Admin: Certificates"
    description: TLS certificate management (JWT + admin)
  - name: "Admin: Bans"
    description: IP ban management (JWT + admin)
  - name: "Admin: Logs"
    description: Delivery and activity logs (JWT + admin)

security:
  - BearerAuth: []

paths:
  # ═══════════════════════════════════════════════════════════════
  # Health
  # ═══════════════════════════════════════════════════════════════
  /api/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/HealthStatus"

  # ═══════════════════════════════════════════════════════════════
  # Auth
  # ═══════════════════════════════════════════════════════════════
  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Log out and clear refresh token cookie
      security: []
      responses:
        "204":
          description: Logged out

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh access token using HTTP-only cookie
      security: []
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RefreshResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ═══════════════════════════════════════════════════════════════
  # Accounts
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts:
    get:
      operationId: listAccounts
      tags: [Accounts]
      summary: List linked mailbox accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: linkAccount
      tags: [Accounts]
      summary: Link an additional mailbox account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkAccountRequest"
      responses:
        "201":
          description: Account linked
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: getAccount
      tags: [Accounts]
      summary: Get a specific linked account
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Account"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: unlinkAccount
      tags: [Accounts]
      summary: Unlink a secondary mailbox account
      responses:
        "204":
          description: Account unlinked
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/accounts/test-connection:
    post:
      operationId: testConnection
      tags: [Accounts]
      summary: Test mailbox credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestConnectionRequest"
      responses:
        "200":
          description: Credentials valid
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/TestConnectionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ═══════════════════════════════════════════════════════════════
  # Folders
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/folders:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: listFolders
      tags: [Folders]
      summary: List folders for an account
      responses:
        "200":
          description: List of folders
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [Folders]
      summary: Create a new folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "201":
          description: Folder created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/FolderName"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/accounts/{id}/folders/{folder}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/FolderName"
    patch:
      operationId: renameFolder
      tags: [Folders]
      summary: Rename a folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameFolderRequest"
      responses:
        "200":
          description: Folder renamed
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/FolderName"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFolder
      tags: [Folders]
      summary: Delete a folder
      responses:
        "204":
          description: Folder deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════
  # Messages
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/folders/{folder}/messages:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - $ref: "#/components/parameters/FolderName"
    get:
      operationId: listMessages
      tags: [Messages]
      summary: List messages in a folder with cursor pagination
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of messages
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/v1/messages/{id}:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    get:
      operationId: getMessage
      tags: [Messages]
      summary: Get a single message by ID
      responses:
        "200":
          description: Message details
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateMessage
      tags: [Messages]
      summary: Update message flags or move to another folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMessageRequest"
      responses:
        "200":
          description: Message updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteMessage
      tags: [Messages]
      summary: Delete a message
      responses:
        "204":
          description: Message deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/messages/send:
    post:
      operationId: sendMessage
      tags: [Messages]
      summary: Compose and send a new message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/messages/{id}/raw:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    get:
      operationId: getRawMessage
      tags: [Messages]
      summary: Get the raw RFC 2822 message source
      responses:
        "200":
          description: Raw message
          content:
            text/plain:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/messages/{id}/forward:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    post:
      operationId: forwardMessage
      tags: [Messages]
      summary: Forward a message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForwardMessageRequest"
      responses:
        "201":
          description: Message forwarded
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════
  # Drafts
  # ═══════════════════════════════════════════════════════════════
  /api/v1/messages/draft:
    post:
      operationId: saveDraft
      tags: [Drafts]
      summary: Save a new draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftRequest"
      responses:
        "201":
          description: Draft saved
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"

  /api/v1/messages/draft/{id}:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    put:
      operationId: updateDraft
      tags: [Drafts]
      summary: Update an existing draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftRequest"
      responses:
        "200":
          description: Draft updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/messages/draft/{id}/send:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    post:
      operationId: sendDraft
      tags: [Drafts]
      summary: Send a saved draft
      responses:
        "201":
          description: Draft sent
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════
  # Threads
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/threads/{threadID}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: threadID
        in: path
        required: true
        schema:
          type: string
        description: Thread identifier
    get:
      operationId: getThread
      tags: [Threads]
      summary: Get all messages in a thread
      responses:
        "200":
          description: Thread messages
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "404":
          $ref: "#/components/responses/NotFound"

  # ═══════════════════════════════════════════════════════════════
  # Quota
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/quota:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: getQuota
      tags: [Quota]
      summary: Get mailbox quota usage
      responses:
        "200":
          description: Quota information
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/QuotaInfo"

  # ═══════════════════════════════════════════════════════════════
  # Search
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/search:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: searchMessages
      tags: [Search]
      summary: Search messages with filters
      parameters:
        - name: q
          in: query
          schema:
            type: string
          description: Free text search query
        - name: folder
          in: query
          schema:
            type: string
          description: Restrict to a specific folder
        - name: from
          in: query
          schema:
            type: string
          description: Filter by sender address
        - name: after
          in: query
          schema:
            type: string
            format: date-time
          description: Messages after this date
        - name: before
          in: query
          schema:
            type: string
            format: date-time
          description: Messages before this date
        - name: "has:attachment"
          in: query
          schema:
            type: boolean
          description: Only messages with attachments
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ═══════════════════════════════════════════════════════════════
  # Attachments
  # ═══════════════════════════════════════════════════════════════
  /api/v1/attachments/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: Attachment ID
    get:
      operationId: getAttachment
      tags: [Attachments]
      summary: Download an attachment
      responses:
        "200":
          description: Attachment binary
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/messages/{id}/attachments:
    parameters:
      - $ref: "#/components/parameters/MessageId"
    get:
      operationId: listAttachments
      tags: [Attachments]
      summary: List attachments for a message
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attachment"

  # ═══════════════════════════════════════════════════════════════
  # Contacts
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/contacts:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: listContacts
      tags: [Contacts]
      summary: List contacts for an account
      parameters:
        - name: trust_level
          in: query
          schema:
            type: string
            enum: [auto, trusted, blocked]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [Contacts]
      summary: Create a new contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Contact"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/accounts/{id}/contacts/{cid}:
    parameters:
      - $ref: "#/components/parameters/AccountId"
      - name: cid
        in: path
        required: true
        schema:
          type: integer
        description: Contact ID
    patch:
      operationId: updateContact
      tags: [Contacts]
      summary: Update a contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Contact updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Contact"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteContact
      tags: [Contacts]
      summary: Delete a contact
      responses:
        "204":
          description: Contact deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/accounts/{id}/contacts/block:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      operationId: blockSender
      tags: [Contacts]
      summary: Block a sender
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Sender blocked
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Contact"

  /api/v1/accounts/{id}/contacts/import:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    post:
      operationId: importContacts
      tags: [Contacts]
      summary: Bulk import contacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportContactsRequest"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [imported]
                    properties:
                      imported:
                        type: integer

  /api/v1/accounts/{id}/contacts/suggest:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: suggestContacts
      tags: [Contacts]
      summary: Autocomplete contacts by query
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact suggestions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Contact"

  # ═══════════════════════════════════════════════════════════════
  # Vacation
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/vacation:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: getVacation
      tags: [Vacation]
      summary: Get vacation auto-reply settings
      responses:
        "200":
          description: Vacation config
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/VacationConfig"
    put:
      operationId: setVacation
      tags: [Vacation]
      summary: Set vacation auto-reply settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VacationConfig"
      responses:
        "200":
          description: Vacation config updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/VacationConfig"
    delete:
      operationId: disableVacation
      tags: [Vacation]
      summary: Disable vacation auto-reply
      responses:
        "204":
          description: Vacation disabled

  # ═══════════════════════════════════════════════════════════════
  # Sieve
  # ═══════════════════════════════════════════════════════════════
  /api/v1/accounts/{id}/sieve:
    parameters:
      - $ref: "#/components/parameters/AccountId"
    get:
      operationId: getSieveScript
      tags: [Sieve]
      summary: Get the Sieve filter script
      responses:
        "200":
          description: Sieve script
          content:
            application/json:
              schema:
