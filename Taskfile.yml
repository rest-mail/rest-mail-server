version: "3"

vars:
  GO_MODULE: github.com/restmail/restmail

tasks:
  # ── Build ──────────────────────────────────────────────
  build:
    desc: Build all Go binaries
    deps: [build:api, build:smtp-gateway, build:imap-gateway, build:pop3-gateway, build:tui, build:certgen, build:migrate, build:seed]

  build:api:
    desc: Build the REST API server
    cmds:
      - go build -o build/api/api ./cmd/api
    sources:
      - cmd/api/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/api/api

  build:gateways:
    desc: Build all three protocol gateways
    deps: [build:smtp-gateway, build:imap-gateway, build:pop3-gateway]

  build:smtp-gateway:
    desc: Build the SMTP protocol gateway
    cmds:
      - go build -o build/gateways/smtp-gateway ./cmd/smtp-gateway
    sources:
      - cmd/smtp-gateway/**/*.go
      - internal/gateway/smtp/**/*.go
      - internal/gateway/apiclient/**/*.go
      - internal/gateway/queue/**/*.go
      - internal/db/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/smtp-gateway

  build:imap-gateway:
    desc: Build the IMAP protocol gateway
    cmds:
      - go build -o build/gateways/imap-gateway ./cmd/imap-gateway
    sources:
      - cmd/imap-gateway/**/*.go
      - internal/gateway/imap/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/imap-gateway

  build:pop3-gateway:
    desc: Build the POP3 protocol gateway
    cmds:
      - go build -o build/gateways/pop3-gateway ./cmd/pop3-gateway
    sources:
      - cmd/pop3-gateway/**/*.go
      - internal/gateway/pop3/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/pop3-gateway

  build:tui:
    desc: Build the TUI admin tool (auto-detects OS/arch)
    vars:
      HOST_OS:
        sh: go env GOHOSTOS
      HOST_ARCH:
        sh: go env GOHOSTARCH
    cmds:
      - GOOS={{.HOST_OS}} GOARCH={{.HOST_ARCH}} go build -o build/tui/tui-{{.HOST_OS}}-{{.HOST_ARCH}} ./cmd/tui
      - echo "Built build/tui/tui-{{.HOST_OS}}-{{.HOST_ARCH}}"
    sources:
      - cmd/tui/**/*.go
      - internal/tui/**/*.go
      - go.mod
      - go.sum

  build:tui:darwin-arm64:
    desc: Cross-compile TUI for macOS Apple Silicon
    env:
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - go build -o build/tui/tui-darwin-arm64 ./cmd/tui

  build:tui:darwin-amd64:
    desc: Cross-compile TUI for macOS Intel
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - go build -o build/tui/tui-darwin-amd64 ./cmd/tui

  build:tui:linux-arm64:
    desc: Cross-compile TUI for Linux arm64
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -o build/tui/tui-linux-arm64 ./cmd/tui

  build:tui:all:
    desc: Build TUI for all platforms
    deps: [build:tui:darwin-arm64, build:tui:darwin-amd64, build:tui:linux-arm64, build:tui]

  build:tools:
    desc: Build all tool binaries (certgen, migrate, seed, website)
    deps: [build:certgen, build:migrate, build:seed, build:website]

  build:certgen:
    desc: Build the certificate generator
    cmds:
      - go build -o build/tools/certgen ./cmd/certgen
    sources:
      - cmd/certgen/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/certgen

  build:migrate:
    desc: Build the migration runner
    cmds:
      - go build -o build/tools/migrate ./cmd/migrate
    sources:
      - cmd/migrate/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/migrate

  build:seed:
    desc: Build the test data seeder
    cmds:
      - go build -o build/tools/seed ./cmd/seed
    sources:
      - cmd/seed/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/seed

  build:website:
    desc: Build the website server binary
    cmds:
      - go build -o build/tools/website ./cmd/website
    sources:
      - cmd/website/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/website

  # ── Test ───────────────────────────────────────────────
  test:
    desc: Run unit tests
    cmds:
      - go test -race -count=1 ./internal/...

  test:unit:
    desc: Run unit tests (alias for test)
    cmds:
      - go test -race -count=1 ./internal/...

  test:verbose:
    desc: Run unit tests with verbose output
    cmds:
      - go test -race -count=1 -v ./internal/...

  test:coverage:
    desc: Run unit tests with coverage report
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./internal/...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  test:e2e:
    desc: Run e2e tests (requires running containers)
    cmds:
      - go test -race -count=1 -v -timeout 5m ./tests/e2e/...

  test:all:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  # ── Code Quality ──────────────────────────────────────
  fmt:
    desc: Format Go source code
    cmds:
      - gofmt -w -s .

  vet:
    desc: Run go vet on all packages
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy and verify Go module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  # ── Docker Compose ─────────────────────────────────────
  up:
    desc: Start all containers
    cmds:
      - docker compose up -d --build

  up:no-build:
    desc: Start all containers without rebuilding
    cmds:
      - docker compose up -d

  down:
    desc: Stop all containers
    cmds:
      - docker compose down

  down:clean:
    desc: Stop containers and remove volumes (destructive)
    cmds:
      - docker compose down -v

  docker:up:
    desc: Start all containers (alias)
    cmds:
      - docker compose up -d --build

  docker:down:
    desc: Stop all containers (alias)
    cmds:
      - docker compose down

  docker:build:
    desc: Build all Docker images without starting
    cmds:
      - docker compose build

  restart:
    desc: Restart all containers
    cmds:
      - docker compose restart

  rebuild:
    desc: Rebuild and restart a specific service
    cmds:
      - docker compose up -d --build {{.CLI_ARGS}}

  logs:
    desc: Tail logs from all containers
    cmds:
      - docker compose logs -f --tail=100

  logs:api:
    desc: Tail logs from the API container
    cmds:
      - docker compose logs -f --tail=100 api

  logs:smtp-gateway:
    desc: Tail logs from the SMTP gateway
    cmds:
      - docker compose logs -f --tail=100 smtp-gateway

  logs:imap-gateway:
    desc: Tail logs from the IMAP gateway
    cmds:
      - docker compose logs -f --tail=100 imap-gateway

  logs:pop3-gateway:
    desc: Tail logs from the POP3 gateway
    cmds:
      - docker compose logs -f --tail=100 pop3-gateway

  logs:gateways:
    desc: Tail logs from all protocol gateways
    cmds:
      - docker compose logs -f --tail=100 smtp-gateway imap-gateway pop3-gateway

  logs:mail:
    desc: Tail logs from mail containers
    cmds:
      - docker compose logs -f --tail=100 postfix-mail1 dovecot-mail1 postfix-mail2 dovecot-mail2

  ps:
    desc: Show running containers
    cmds:
      - docker compose ps

  # ── Database ───────────────────────────────────────────
  db:migrate:
    desc: Run database migrations inside the api container
    cmds:
      - docker compose exec api go run ./cmd/migrate

  db:seed:
    desc: Seed database with test data inside the api container
    cmds:
      - docker compose exec api go run ./cmd/seed

  db:reset:
    desc: Reset database (migrate + seed)
    cmds:
      - task: db:migrate
      - task: db:seed

  db:psql:
    desc: Open psql shell to the database
    cmds:
      - docker compose exec postgres psql -U restmail -d restmail

  # ── Certificates ───────────────────────────────────────
  certs:generate:
    desc: Generate self-signed CA and dev certificates
    cmds:
      - bash docker/certs/generate-certs.sh

  # ── Development Workflow ───────────────────────────────
  #
  # Everything runs inside Docker containers.
  # Hot reload is handled by docker-compose.override.yml:
  #   api     → air (rebuilds Go on .go file changes)
  #   webmail → Vite HMR (instant React updates)
  #
  # Startup order:
  #   1. Infrastructure: postgres (wait healthy), dnsmasq, js-filter, certgen (one-shot)
  #   2. Mail servers:   postfix-mail1/2, dovecot-mail1/2
  #   3. API:            waits internally for postgres to be healthy, runs AutoMigrate
  #   4. Health check:   poll /api/health until the API is serving requests
  #   5. Gateways:       smtp-gateway, imap-gateway, pop3-gateway
  #   6. Webmail:        Vite dev server with HMR
  #
  dev:
    desc: Start the full dev environment in Docker with hot reload
    cmds:
      # Phase 1 — infrastructure (postgres + its deps resolve via depends_on internally)
      - echo "► Starting infrastructure..."
      - docker compose up -d --build docker-config-gen docker-proxy postgres dnsmasq js-filter certgen postfix-mail1 dovecot-mail1 postfix-mail2 dovecot-mail2

      # Phase 2 — API (Docker waits for postgres healthy before starting it)
      - echo "► Starting API..."
      - docker compose up -d --build api

      # Phase 3 — wait for the API to be actually serving requests
      - task: health:wait

      # Phase 4 — gateways and webmail (Docker ensures certgen has exited before gateways)
      - echo "► Starting gateways and webmail..."
      - docker compose up -d --build smtp-gateway imap-gateway pop3-gateway webmail website

      - |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  restmail dev environment ready"
        echo ""
        echo "  Website   →  http://localhost/"
        echo "  Webmail   →  http://localhost/webmail"
        echo "  API       →  http://localhost/api"
        echo "  API docs  →  http://localhost/api/docs"
        echo ""
        echo "  Direct (bypass proxy):"
        echo "    Webmail →  http://localhost:3001  (Vite, HMR)"
        echo "    API     →  http://localhost:8080"
        echo ""
        echo "  task logs          tail all container logs"
        echo "  task logs:api      tail API logs only"
        echo "  task ps            show container status"
        echo "  task dev:restart   restart a service (e.g. task dev:restart -- api)"
        echo "  task down          stop everything"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  dev:api:
    desc: Rebuild and restart the API container (air hot reload)
    cmds:
      - docker compose up -d --build api

  dev:webmail:
    desc: Rebuild and restart the webmail container (Vite HMR)
    cmds:
      - docker compose up -d --build webmail

  dev:smtp-gateway:
    desc: Rebuild and restart the SMTP gateway container (air hot reload)
    cmds:
      - docker compose up -d --build smtp-gateway

  dev:imap-gateway:
    desc: Rebuild and restart the IMAP gateway container (air hot reload)
    cmds:
      - docker compose up -d --build imap-gateway

  dev:pop3-gateway:
    desc: Rebuild and restart the POP3 gateway container (air hot reload)
    cmds:
      - docker compose up -d --build pop3-gateway

  dev:restart:
    desc: Rebuild and restart a single service, e.g. task dev:restart -- api
    cmds:
      - docker compose up -d --build {{.CLI_ARGS}}

  dev:stop:
    desc: Stop dev containers without removing them
    cmds:
      - docker compose stop

  # ── Setup ──────────────────────────────────────────────
  setup:
    desc: Install dependencies, build all binaries, verify toolchain
    cmds:
      - echo "Checking Go..."
      - go version
      - echo "Downloading Go modules..."
      - go mod download
      - echo "Installing webmail dependencies..."
      - cd webmail && npm ci
      - echo "Verifying build..."
      - go build ./...
      - echo "Setup complete."

  # ── Health Check ─────────────────────────────────────────
  health:wait:
    desc: Wait for the API health endpoint to respond (up to 60s)
    cmds:
      - |
        echo "Waiting for API health endpoint..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
            echo "API is healthy."
            exit 0
          fi
          echo "  attempt $i/30 - not ready yet..."
          sleep 2
        done
        echo "ERROR: API did not become healthy within 60 seconds."
        exit 1

  # ── Website ────────────────────────────────────────────
  website:go:
    desc: Run the RESTMAIL landing page via Go dev server (inside api container)
    cmds:
      - docker compose exec api go run ./cmd/website -addr :8090 -root /app/website

  website:dev:
    desc: Start the website container (nginx)
    cmds:
      - docker compose up -d website
      - echo "Website running at http://localhost:8090"

  website:stop:
    desc: Stop the website container
    cmds:
      - docker compose stop website

  website:logs:
    desc: View website container logs
    cmds:
      - docker compose logs -f --tail=100 website

  # ── Clean ──────────────────────────────────────────────
  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/
      - rm -f coverage.out coverage.html
