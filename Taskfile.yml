version: "3"

env:
  COMPOSE_PROJECT_NAME: rest-mail

vars:
  GO_MODULE: github.com/restmail/restmail

tasks:

  # ════════════════════════════════════════════════════════
  # Build
  # ════════════════════════════════════════════════════════

  build:
    desc: Build all Go binaries
    deps: [build:api, build:smtp-gateway, build:imap-gateway, build:pop3-gateway, build:console, build:certgen, build:migrate, build:seed]

  build:api:
    desc: Build the REST API server
    cmds:
      - go build -o build/api/api ./cmd/api
    sources:
      - cmd/api/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/api/api

  build:gateways:
    desc: Build all three protocol gateways
    deps: [build:smtp-gateway, build:imap-gateway, build:pop3-gateway]

  build:smtp-gateway:
    desc: Build the SMTP protocol gateway
    cmds:
      - go build -o build/gateways/smtp-gateway ./cmd/smtp-gateway
    sources:
      - cmd/smtp-gateway/**/*.go
      - internal/gateway/smtp/**/*.go
      - internal/gateway/apiclient/**/*.go
      - internal/gateway/queue/**/*.go
      - internal/db/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/smtp-gateway

  build:imap-gateway:
    desc: Build the IMAP protocol gateway
    cmds:
      - go build -o build/gateways/imap-gateway ./cmd/imap-gateway
    sources:
      - cmd/imap-gateway/**/*.go
      - internal/gateway/imap/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/imap-gateway

  build:pop3-gateway:
    desc: Build the POP3 protocol gateway
    cmds:
      - go build -o build/gateways/pop3-gateway ./cmd/pop3-gateway
    sources:
      - cmd/pop3-gateway/**/*.go
      - internal/gateway/pop3/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/pop3-gateway

  build:webmail:
    desc: Build the webmail Docker image (production)
    cmds:
      - docker compose -f docker-compose.yml build webmail

  build:website:
    desc: Build the website server binary
    cmds:
      - go build -o build/tools/website ./cmd/website
    sources:
      - cmd/website/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/website

  build:console:
    desc: Build the console admin tool (auto-detects OS/arch)
    vars:
      HOST_OS:
        sh: go env GOHOSTOS
      HOST_ARCH:
        sh: go env GOHOSTARCH
    cmds:
      - GOOS={{.HOST_OS}} GOARCH={{.HOST_ARCH}} go build -o build/console/console-{{.HOST_OS}}-{{.HOST_ARCH}} ./cmd/console
      - echo "Built build/console/console-{{.HOST_OS}}-{{.HOST_ARCH}}"
    sources:
      - cmd/console/**/*.go
      - internal/console/**/*.go
      - go.mod
      - go.sum

  build:console:darwin-arm64:
    desc: Cross-compile console for macOS Apple Silicon
    env:
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - go build -o build/console/console-darwin-arm64 ./cmd/console

  build:console:darwin-amd64:
    desc: Cross-compile console for macOS Intel
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - go build -o build/console/console-darwin-amd64 ./cmd/console

  build:console:linux-arm64:
    desc: Cross-compile console for Linux arm64
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -o build/console/console-linux-arm64 ./cmd/console

  build:console:all:
    desc: Build console for all platforms
    deps: [build:console:darwin-arm64, build:console:darwin-amd64, build:console:linux-arm64, build:console]

  build:tools:
    desc: Build all tool binaries (certgen, migrate, seed, website, instantmailcheck)
    deps: [build:certgen, build:migrate, build:seed, build:website, build:instantmailcheck]

  build:certgen:
    desc: Build the certificate generator
    cmds:
      - go build -o build/tools/certgen ./cmd/certgen
    sources:
      - cmd/certgen/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/certgen

  build:migrate:
    desc: Build the migration runner
    cmds:
      - go build -o build/tools/migrate ./cmd/migrate
    sources:
      - cmd/migrate/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/migrate

  build:seed:
    desc: Build the test data seeder
    cmds:
      - go build -o build/tools/seed ./cmd/seed
    sources:
      - cmd/seed/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/seed

  build:instantmailcheck:
    desc: Build the Instant Mail Check CLI tool (auto-detects OS/arch)
    vars:
      HOST_OS:
        sh: go env GOHOSTOS
      HOST_ARCH:
        sh: go env GOHOSTARCH
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o build/tools/instantmailcheck-{{.HOST_OS}}-{{.HOST_ARCH}} ./cmd/instantmailcheck
      - echo "Built build/tools/instantmailcheck-{{.HOST_OS}}-{{.HOST_ARCH}} ({{.VERSION}})"
    sources:
      - cmd/instantmailcheck/**/*.go
      - internal/mailcheck/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/instantmailcheck-{{.HOST_OS}}-{{.HOST_ARCH}}

  build:instantmailcheck:darwin-arm64:
    desc: Cross-compile Instant Mail Check for macOS Apple Silicon
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    env:
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o build/tools/instantmailcheck-darwin-arm64 ./cmd/instantmailcheck

  build:instantmailcheck:darwin-amd64:
    desc: Cross-compile Instant Mail Check for macOS Intel
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o build/tools/instantmailcheck-darwin-amd64 ./cmd/instantmailcheck

  build:instantmailcheck:linux-arm64:
    desc: Cross-compile Instant Mail Check for Linux arm64
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o build/tools/instantmailcheck-linux-arm64 ./cmd/instantmailcheck

  build:instantmailcheck:linux-amd64:
    desc: Cross-compile Instant Mail Check for Linux amd64
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
    env:
      GOOS: linux
      GOARCH: amd64
    cmds:
      - go build -ldflags "-X main.Version={{.VERSION}}" -o build/tools/instantmailcheck-linux-amd64 ./cmd/instantmailcheck

  build:instantmailcheck:all:
    desc: Build Instant Mail Check for all platforms
    deps: [build:instantmailcheck:darwin-arm64, build:instantmailcheck:darwin-amd64, build:instantmailcheck:linux-arm64, build:instantmailcheck:linux-amd64, build:instantmailcheck]

  # ════════════════════════════════════════════════════════
  # Test
  # ════════════════════════════════════════════════════════

  test:
    desc: Run unit tests
    cmds:
      - go test -race -count=1 ./internal/...

  test:unit:
    desc: Run unit tests (alias for test)
    cmds:
      - go test -race -count=1 ./internal/...

  test:verbose:
    desc: Run unit tests with verbose output
    cmds:
      - go test -race -count=1 -v ./internal/...

  test:coverage:
    desc: Run unit tests with coverage report
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./internal/...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  test:e2e:
    desc: Run e2e tests (requires running containers)
    cmds:
      - go test -race -count=1 -v -timeout 5m ./tests/e2e/...

  test:all:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  # ════════════════════════════════════════════════════════
  # Code Quality
  # ════════════════════════════════════════════════════════

  fmt:
    desc: Format Go source code
    cmds:
      - gofmt -w -s .

  vet:
    desc: Run go vet on all packages
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy and verify Go module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  # ════════════════════════════════════════════════════════
  # start:<service>
  #
  # Each task starts exactly one container and declares deps on the tasks
  # for its prerequisites. Docker Compose's own depends_on handles fine-
  # grained health/completion checks; the task deps express the graph so
  # that `task start:api` automatically brings up postgres, dnsmasq, etc.
  # ════════════════════════════════════════════════════════

  # ── Infrastructure ──────────────────────────────────────
  start:postgres:
    desc: Start all PostgreSQL instances
    deps: [start:postgres-mail1, start:postgres-mail2, start:postgres-mail3]

  start:postgres-mail1:
    desc: Start PostgreSQL for mail1.test
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate postgres-mail1

  start:postgres-mail2:
    desc: Start PostgreSQL for mail2.test
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate postgres-mail2

  start:postgres-mail3:
    desc: Start PostgreSQL for mail3.test (API + gateways)
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate postgres-mail3

  start:dnsmasq:
    desc: Start the DNS server
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate dnsmasq

  start:js-filter:
    desc: Start the JS filter sidecar
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate js-filter

  start:certgen:
    desc: Run the certificate generator (one-shot init container)
    deps: [net:ensure]
    cmds:
      - docker compose up -d --build --force-recreate certgen

  # ── Mail ────────────────────────────────────────────────
  start:dovecot-mail1:
    desc: Start Dovecot for mail1.test
    deps: [start:postgres-mail1, start:certgen]
    cmds:
      - docker compose up -d --build --force-recreate dovecot-mail1

  start:dovecot-mail2:
    desc: Start Dovecot for mail2.test
    deps: [start:postgres-mail2, start:certgen]
    cmds:
      - docker compose up -d --build --force-recreate dovecot-mail2

  start:postfix-mail1:
    desc: Start Postfix for mail1.test
    deps: [start:dovecot-mail1, start:dnsmasq]
    cmds:
      - docker compose up -d --build --force-recreate postfix-mail1

  start:postfix-mail2:
    desc: Start Postfix for mail2.test
    deps: [start:dovecot-mail2, start:dnsmasq]
    cmds:
      - docker compose up -d --build --force-recreate postfix-mail2

  # ── API ─────────────────────────────────────────────────
  start:api:
    desc: Start the REST API (waits for health endpoint)
    deps: [start:postgres-mail3, start:dnsmasq, start:js-filter]
    cmds:
      - docker compose up -d --build --force-recreate api
      - task: health:wait

  # ── Gateways ────────────────────────────────────────────
  start:smtp-gateway:
    desc: Start the SMTP gateway
    deps: [start:api, start:certgen]
    cmds:
      - docker compose up -d --build --force-recreate smtp-gateway

  start:imap-gateway:
    desc: Start the IMAP gateway
    deps: [start:api, start:certgen]
    cmds:
      - docker compose up -d --build --force-recreate imap-gateway

  start:pop3-gateway:
    desc: Start the POP3 gateway
    deps: [start:api, start:certgen]
    cmds:
      - docker compose up -d --build --force-recreate pop3-gateway

  # ── Webmail ─────────────────────────────────────────────
  start:webmail:
    desc: Start the webmail frontend (production nginx)
    deps: [start:api]
    cmds:
      - docker compose -f webmail/docker-compose.yml up -d --build --force-recreate webmail

  start:webmail:dev:
    desc: Start the webmail frontend with Vite HMR (hot reload)
    deps: [start:api]
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml up -d --build --force-recreate webmail

  # ── Website ─────────────────────────────────────────────
  start:website:
    desc: Start the project website
    deps: [net:ensure]
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml up -d --build --force-recreate website

  start:website:dev:
    desc: Start the project website with live source mount (dev)
    deps: [net:ensure]
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml -f website/docker-compose.override.yml up -d --force-recreate website

  # ── Admin ───────────────────────────────────────────────
  start:admin:dev:
    desc: Start the admin frontend with Vite HMR (hot reload)
    deps: [start:api]
    cmds:
      - docker compose -f admin/docker-compose.yml -f admin/docker-compose.override.yml up -d --build --force-recreate admin

  # ════════════════════════════════════════════════════════
  # stop:<service>
  # ════════════════════════════════════════════════════════

  # ── Infrastructure ──────────────────────────────────────
  stop:postgres:
    desc: Stop all PostgreSQL instances
    cmds:
      - docker compose stop postgres-mail1 postgres-mail2 postgres-mail3

  stop:dnsmasq:
    desc: Stop the DNS server
    cmds:
      - docker compose stop dnsmasq

  stop:js-filter:
    desc: Stop the JS filter sidecar
    cmds:
      - docker compose stop js-filter

  # ── Mail ────────────────────────────────────────────────
  stop:dovecot-mail1:
    desc: Stop Dovecot for mail1.test
    cmds:
      - docker compose stop dovecot-mail1

  stop:dovecot-mail2:
    desc: Stop Dovecot for mail2.test
    cmds:
      - docker compose stop dovecot-mail2

  stop:postfix-mail1:
    desc: Stop Postfix for mail1.test
    cmds:
      - docker compose stop postfix-mail1

  stop:postfix-mail2:
    desc: Stop Postfix for mail2.test
    cmds:
      - docker compose stop postfix-mail2

  # ── API ─────────────────────────────────────────────────
  stop:api:
    desc: Stop the REST API
    cmds:
      - docker compose stop api

  # ── Gateways ────────────────────────────────────────────
  stop:smtp-gateway:
    desc: Stop the SMTP gateway
    cmds:
      - docker compose stop smtp-gateway

  stop:imap-gateway:
    desc: Stop the IMAP gateway
    cmds:
      - docker compose stop imap-gateway

  stop:pop3-gateway:
    desc: Stop the POP3 gateway
    cmds:
      - docker compose stop pop3-gateway

  # ── Webmail ─────────────────────────────────────────────
  stop:webmail:
    desc: Stop the webmail frontend
    cmds:
      - docker compose -f webmail/docker-compose.yml stop webmail

  stop:webmail:dev:
    desc: Stop webmail containers (Vite HMR)
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml stop

  # ── Website ─────────────────────────────────────────────
  stop:website:
    desc: Stop the project website
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml stop website

  stop:website:dev:
    desc: Stop the project website (dev)
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml -f website/docker-compose.override.yml stop website

  # ── Admin ───────────────────────────────────────────────
  stop:admin:dev:
    desc: Stop the admin frontend
    cmds:
      - docker compose -f admin/docker-compose.yml stop admin

  # ── Monitoring ──────────────────────────────────────────
  stop:monitoring:
    desc: Stop monitoring containers
    cmds:
      - docker compose -f monitoring/docker-compose.yml stop

  # ════════════════════════════════════════════════════════
  # restart:<service>
  #
  # Rebuilds and restarts a single container. Prerequisites are assumed
  # to already be running (use start:<service> if they are not).
  # ════════════════════════════════════════════════════════

  # ── Infrastructure ──────────────────────────────────────
  restart:postgres:
    desc: Restart all PostgreSQL instances
    cmds:
      - docker compose restart postgres-mail1 postgres-mail2 postgres-mail3

  restart:dnsmasq:
    desc: Restart the DNS server
    cmds:
      - docker compose restart dnsmasq

  restart:js-filter:
    desc: Rebuild and restart the JS filter sidecar
    cmds:
      - docker compose up -d --build --force-recreate js-filter

  # ── Mail ────────────────────────────────────────────────
  restart:dovecot-mail1:
    desc: Restart Dovecot for mail1.test
    cmds:
      - docker compose restart dovecot-mail1

  restart:dovecot-mail2:
    desc: Restart Dovecot for mail2.test
    cmds:
      - docker compose restart dovecot-mail2

  restart:postfix-mail1:
    desc: Restart Postfix for mail1.test
    cmds:
      - docker compose restart postfix-mail1

  restart:postfix-mail2:
    desc: Restart Postfix for mail2.test
    cmds:
      - docker compose restart postfix-mail2

  # ── API ─────────────────────────────────────────────────
  restart:api:
    desc: Rebuild and restart the REST API (air hot reload)
    cmds:
      - docker compose up -d --build --force-recreate api

  # ── Gateways ────────────────────────────────────────────
  restart:smtp-gateway:
    desc: Rebuild and restart the SMTP gateway (air hot reload)
    cmds:
      - docker compose up -d --build --force-recreate smtp-gateway

  restart:imap-gateway:
    desc: Rebuild and restart the IMAP gateway (air hot reload)
    cmds:
      - docker compose up -d --build --force-recreate imap-gateway

  restart:pop3-gateway:
    desc: Rebuild and restart the POP3 gateway (air hot reload)
    cmds:
      - docker compose up -d --build --force-recreate pop3-gateway

  # ── Webmail ─────────────────────────────────────────────
  restart:webmail:
    desc: Rebuild and restart the webmail frontend
    cmds:
      - docker compose -f webmail/docker-compose.yml up -d --build --force-recreate webmail

  restart:webmail:dev:
    desc: Rebuild and restart the webmail frontend (Vite HMR)
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml up -d --build --force-recreate webmail

  # ── Website ─────────────────────────────────────────────
  restart:website:
    desc: Restart the project website
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml restart website

  restart:website:dev:
    desc: Restart the project website (dev)
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml -f website/docker-compose.override.yml up -d --force-recreate website

  # ── Admin ───────────────────────────────────────────────
  restart:admin:dev:
    desc: Rebuild and restart the admin frontend (Vite HMR)
    cmds:
      - docker compose -f admin/docker-compose.yml -f admin/docker-compose.override.yml up -d --build --force-recreate admin

  # ── Monitoring ──────────────────────────────────────────
  restart:monitoring:
    desc: Restart monitoring containers
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f monitoring/docker-compose.yml restart

  # ════════════════════════════════════════════════════════
  # dev / stop / restart (all services)
  # ════════════════════════════════════════════════════════

  dev:
    desc: Start the full dev environment (hot reload via air + Vite)
    deps:
      - start:webmail:dev
      - start:website:dev
      - start:admin:dev
      - start:smtp-gateway
      - start:imap-gateway
      - start:pop3-gateway
      - start:postfix-mail1
      - start:postfix-mail2
    cmds:
      - |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  restmail dev environment ready"
        echo ""
        echo "  Website   →  http://localhost/"
        echo "  Webmail   →  http://localhost/webmail"
        echo "  API       →  http://localhost/api"
        echo "  API docs  →  http://localhost/api/docs"
        echo ""
        echo "  Direct (bypass proxy):"
        echo "    Webmail →  http://localhost:3001  (Vite, HMR)"
        echo "    API     →  http://localhost:8080"
        echo ""
        echo "  task start:<service>    start a service + its deps"
        echo "  task stop:<service>     stop a single container"
        echo "  task stop               stop all containers (preserves them)"
        echo "  task restart:<service>  rebuild + restart a container"
        echo "  task logs               tail all container logs"
        echo "  task ps                 show container status"
        echo "  task down               stop + remove all containers"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  stop:
    desc: Stop all containers without removing them (fast restart with `task dev`)
    deps: [stop:core, stop:dev, stop:monitoring]

  stop:core:
    desc: Stop all core containers (root compose)
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.override.yml stop

  stop:dev:
    desc: Stop all dev containers without removing them (fast restart with `task dev`)
    deps: [stop:core, stop:webmail:dev, stop:website:dev, stop:admin:dev, stop:monitoring]

  restart:dev:
    desc: Restart all running dev containers (preserves dep order)
    deps: [restart:dev:core, restart:webmail:dev, restart:website:dev, restart:admin:dev, restart:monitoring]

  restart:dev:core:
    desc: Restart core containers (root compose)
    deps: [restart:api, restart:smtp-gateway, restart:imap-gateway, restart:pop3-gateway]

  # ════════════════════════════════════════════════════════
  # down / down:clean / reset
  # ════════════════════════════════════════════════════════

  down:
    desc: Stop and remove all containers (including orphans)
    deps: [down:core, down:webmail:dev, down:website:dev, down:monitoring]

  down:core:
    desc: Stop and remove core containers (root compose)
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.override.yml down --remove-orphans

  down:webmail:
    desc: Stop and remove webmail containers
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml down --remove-orphans

  down:webmail:dev:
    desc: Stop and remove webmail dev containers (Vite HMR)
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml down --remove-orphans

  down:website:
    desc: Stop and remove website containers
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml down --remove-orphans

  down:website:dev:
    desc: Stop and remove website dev containers
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml -f website/docker-compose.override.yml down --remove-orphans

  down:monitoring:
    desc: Stop and remove monitoring containers
    cmds:
      - docker compose -f monitoring/docker-compose.yml down --remove-orphans

  down:clean:
    desc: Stop containers, remove volumes and orphans (destructive)
    deps: [down:clean:core, down:clean:webmail:dev, down:clean:website:dev, down:clean:monitoring]

  down:clean:core:
    desc: Stop core containers and remove volumes (destructive)
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.override.yml down --remove-orphans -v

  down:clean:webmail:
    desc: Stop webmail containers and remove volumes (destructive)
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml down --remove-orphans -v

  down:clean:webmail:dev:
    desc: Stop webmail dev containers and remove volumes (destructive)
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml down --remove-orphans -v

  down:clean:website:
    desc: Stop website containers and remove volumes (destructive)
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml down --remove-orphans -v

  down:clean:website:dev:
    desc: Stop website dev containers and remove volumes (destructive)
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml -f website/docker-compose.override.yml down --remove-orphans -v

  down:clean:monitoring:
    desc: Stop monitoring containers and remove volumes (destructive)
    cmds:
      - docker compose -f monitoring/docker-compose.yml down --remove-orphans -v

  reset:
    desc: Full teardown — remove all containers, orphans, then prune stale names
    deps: [down]
    cmds:
      - docker container prune -f

  reset:hard:
    desc: Full teardown including volumes — use when you want a clean slate
    deps: [down:clean]
    cmds:
      - docker container prune -f
      - docker network prune -f

  # ════════════════════════════════════════════════════════
  # Logs
  # ════════════════════════════════════════════════════════

  logs:
    desc: Tail logs from all containers
    deps: [logs:core, logs:webmail, logs:website, logs:monitoring]

  logs:core:
    desc: Tail logs from core containers
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.override.yml logs -f --tail=100

  logs:api:
    desc: Tail logs from the API container
    cmds:
      - docker compose logs -f --tail=100 api

  logs:gateways:
    desc: Tail logs from all protocol gateways
    cmds:
      - docker compose logs -f --tail=100 smtp-gateway imap-gateway pop3-gateway

  logs:smtp-gateway:
    desc: Tail logs from the SMTP gateway
    cmds:
      - docker compose logs -f --tail=100 smtp-gateway

  logs:imap-gateway:
    desc: Tail logs from the IMAP gateway
    cmds:
      - docker compose logs -f --tail=100 imap-gateway

  logs:pop3-gateway:
    desc: Tail logs from the POP3 gateway
    cmds:
      - docker compose logs -f --tail=100 pop3-gateway

  logs:mail:
    desc: Tail logs from mail containers
    cmds:
      - docker compose logs -f --tail=100 postfix-mail1 dovecot-mail1 postfix-mail2 dovecot-mail2

  logs:webmail:
    desc: Tail logs from webmail containers
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml logs -f --tail=100

  logs:webmail:container:
    desc: Tail logs from the webmail container
    cmds:
      - docker compose -f webmail/docker-compose.yml logs -f --tail=100 webmail

  logs:website:
    desc: Tail logs from website containers
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml logs -f --tail=100

  logs:website:container:
    desc: Tail logs from the website container
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml logs -f --tail=100 website

  logs:monitoring:
    desc: Tail logs from monitoring containers
    cmds:
      - docker compose -f monitoring/docker-compose.yml logs -f --tail=100

  # ════════════════════════════════════════════════════════
  # ps (container status)
  # ════════════════════════════════════════════════════════

  ps:
    desc: Show running containers
    deps: [ps:core, ps:webmail, ps:website, ps:monitoring]

  ps:core:
    desc: Show running core containers
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.override.yml ps

  ps:webmail:
    desc: Show running webmail containers
    cmds:
      - docker compose -f webmail/docker-compose.yml -f webmail/docker-compose.override.yml ps

  ps:website:
    desc: Show running website containers
    cmds:
      - docker compose -p $COMPOSE_PROJECT_NAME -f website/docker-compose.yml ps

  ps:monitoring:
    desc: Show running monitoring containers
    cmds:
      - docker compose -f monitoring/docker-compose.yml ps

  # ════════════════════════════════════════════════════════
  # Database
  # ════════════════════════════════════════════════════════

  db:migrate:
    desc: Run database migrations for mail3 (API handles its own schema)
    cmds:
      - docker compose exec api go run ./cmd/migrate

  db:seed:
    desc: Seed mail3 database with test data (mail1/mail2 are auto-seeded via init scripts)
    cmds:
      - docker compose exec api go run ./cmd/seed

  db:reset:
    desc: Reset all databases (destroy volumes + recreate)
    cmds:
      - docker compose stop postgres-mail1 postgres-mail2 postgres-mail3
      - docker compose rm -f postgres-mail1 postgres-mail2 postgres-mail3
      - docker volume rm -f rest-mail_postgres-mail1-data rest-mail_postgres-mail2-data rest-mail_postgres-mail3-data
      - task: start:postgres
      - task: db:seed

  db:psql:
    desc: Open psql shell to the mail3 database
    cmds:
      - docker compose exec postgres-mail3 psql -U restmail -d restmail

  db:psql:mail1:
    desc: Open psql shell to the mail1 database
    cmds:
      - docker compose exec postgres-mail1 psql -U restmail -d restmail

  db:psql:mail2:
    desc: Open psql shell to the mail2 database
    cmds:
      - docker compose exec postgres-mail2 psql -U restmail -d restmail

  # ════════════════════════════════════════════════════════
  # Utilities
  # ════════════════════════════════════════════════════════

  net:ensure:
    desc: Ensure the shared mailnet docker network exists
    run: once
    cmds:
      - |
        docker network inspect "${COMPOSE_PROJECT_NAME}_mailnet" >/dev/null 2>&1 || \
          docker network create --driver bridge --subnet 172.20.0.0/16 "${COMPOSE_PROJECT_NAME}_mailnet"

  health:wait:
    desc: Wait for the API health endpoint to respond (up to 60s)
    cmds:
      - |
        echo "Waiting for API health endpoint..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
            echo "API is healthy."
            exit 0
          fi
          echo "  attempt $i/30 - not ready yet..."
          sleep 2
        done
        echo "ERROR: API did not become healthy within 60 seconds."
        exit 1

  run:console:
    desc: Run the console admin tool without building (development mode)
    cmds:
      - docker compose exec -it -e RESTMAIL_ADMIN_USERNAME=${RESTMAIL_ADMIN_USERNAME:-admin} -e RESTMAIL_ADMIN_PASSWORD=${RESTMAIL_ADMIN_PASSWORD:-admin123!@} api go run ./cmd/console --api http://localhost:8080

  certs:generate:
    desc: Generate self-signed CA and dev certificates
    cmds:
      - bash docker/certs/generate-certs.sh

  setup:
    desc: Install dependencies, build all binaries, verify toolchain
    cmds:
      - echo "Checking Go..."
      - go version
      - echo "Downloading Go modules..."
      - go mod download
      - echo "Installing webmail dependencies..."
      - cd webmail && npm ci
      - echo "Verifying build..."
      - go build ./...
      - echo "Setup complete."

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/
      - rm -f coverage.out coverage.html

  container:purge:
    desc: Remove legacy containers from previous layouts (safe; containers only)
    cmds:
      - task: down
      - |
        ids=$(docker ps -aq --filter "name=^/${COMPOSE_PROJECT_NAME}-")
        if [ -n "$ids" ]; then
          docker rm -f $ids
        fi

  container:purge:hard:
    desc: Remove legacy containers + volumes + shared network (destructive)
    cmds:
      - task: down:clean
      - |
        ids=$(docker ps -aq --filter "name=^/${COMPOSE_PROJECT_NAME}-")
        if [ -n "$ids" ]; then
          docker rm -f $ids
        fi
      - |
        docker network rm "${COMPOSE_PROJECT_NAME}_mailnet" >/dev/null 2>&1 || true

  compose:purge:
    desc: Alias for container:purge
    cmds:
      - task: container:purge

  compose:purge:hard:
    desc: Alias for container:purge:hard
    cmds:
      - task: container:purge:hard
