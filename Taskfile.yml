version: "3"

# silent: true hides the `task: [name] cmd` prelude. Use `task -v` on the
# CLI to bring the prelude back when debugging. Each tasks/*.yml include
# also sets silent: true on its own scope.
silent: true

# OUTPUT redirects raw command stdout. Default is /dev/null (quiet); set
# VERBOSE=1 to send raw output to stdout instead. Defined here at the
# top level via env: with sh:, which propagates as a shell env var to
# every task in this file AND every task in the included tasks/*.yml
# files. Per-cmd usage: `docker build … >$OUTPUT 2>&1` — no per-block
# `[ -n "${VERBOSE}" ] && OUTPUT=…` boilerplate needed.
env:
  COMPOSE_PROJECT_NAME: rest-mail
  OUTPUT:
    sh: '[ -n "$VERBOSE" ] && echo /dev/stdout || echo /dev/null'

# ════════════════════════════════════════════════════════
# Centralized vars — single source of truth for ports, IPs, hostnames,
# credentials, and image tags. Per-service Taskfiles in tasks/ inherit
# these via the `includes:` block below. Future: derive testbed DNS
# zone records from these values to simulate a real mail server zone.
# ════════════════════════════════════════════════════════
vars:
  GO_MODULE: github.com/restmail/restmail

  # NOTE: parent vars use a RESTMAIL_/MAIL3_/MONITORING_ prefix to avoid
  # collision with subproject (testbed, mailserver) include vars. Task
  # 3.49.1 merges all included Taskfiles' vars into a flat shared
  # namespace at invocation time, so a bare `PROJECT: rest-mail` here
  # would be overwritten by the testbed include's `PROJECT: testbed`.
  RESTMAIL_PROJECT: rest-mail

  # Substrate (testbed-owned)
  RESTMAIL_NETWORK: testbed_mailnet
  RESTMAIL_CERTS_VOLUME: testbed_certs
  RESTMAIL_TESTBED_DNS_IP: 10.99.0.10

  # Image registry/org and tag. Locally-built images are tagged with the
  # same FQDN as upstream pulls (ghcr.io/rest-mail/<svc>:dev) for
  # consistency with reference-* images that come from the registry.
  RESTMAIL_REGISTRY: ghcr.io/rest-mail
  RESTMAIL_IMAGE_TAG: dev

  # Mail3 instance identity
  MAIL3_HOSTNAME: mail3.test
  RESTMAIL_PROXY_HOST: restmail.localhost

  # Container IPs on mailnet
  MAIL3_API_IP: 10.99.0.20
  MAIL3_SMTP_IP: 10.99.0.13
  MAIL3_IMAP_IP: 10.99.0.15
  MAIL3_POP3_IP: 10.99.0.16
  MAIL3_POSTGRES_IP: 10.99.0.43
  MAIL3_JS_FILTER_IP: 10.99.0.22
  MAIL3_WEBMAIL_IP: 10.99.0.21
  MAIL3_ADMIN_IP: 10.99.0.27
  MAIL3_WEBSITE_IP: 10.99.0.26
  MONITORING_PROMETHEUS_IP: 10.99.0.30
  MONITORING_GRAFANA_IP: 10.99.0.31
  MONITORING_POSTGRES_EXPORTER_IP: 10.99.0.32

  # Postgres
  MAIL3_DB_NAME: restmail
  MAIL3_DB_USER: restmail
  MAIL3_DB_PASS: restmail

  # API
  MAIL3_API_PORT: '8080'
  MAIL3_JWT_SECRET: dev-secret-change-in-production
  MAIL3_MASTER_KEY: dev-master-key-change-in-production

  # SMTP/IMAP/POP3 ports
  MAIL3_SMTP_PORT_INBOUND: '25'
  MAIL3_SMTP_PORT_SUBMISSION: '587'
  MAIL3_SMTP_PORT_SUBMISSION_TLS: '465'
  MAIL3_IMAP_PORT: '143'
  MAIL3_IMAP_TLS_PORT: '993'
  MAIL3_POP3_PORT: '110'
  MAIL3_POP3_TLS_PORT: '995'

  # Build / runtime (RESTMAIL_IMAGE_TAG already declared above)
  MAIL3_LOG_LEVEL: debug
  MAIL3_ENVIRONMENT: development

# ════════════════════════════════════════════════════════
# Includes
#
# Subproject Taskfiles are pulled in so all their operational tasks (up,
# down, smoke, dig, ...) flow through automatically. `optional: true`
# lets a fresh checkout work before *:init has run; tasks under that
# namespace become available once the directory exists.
#
# Each tasks/<service>.yml is included with vars passed from the
# centralized vars block above so values stay in one place.
# ════════════════════════════════════════════════════════
includes:
  # ── Local services (this repo) ──────────────────────────
  # Subproject includes (testbed, mailserver:*) come AFTER these. Task
  # processes includes in document order and each include's vars block
  # bleeds into the resolution context for subsequent includes — so any
  # include that references {{.RESTMAIL_PROJECT}} etc. must come before the
  # subproject includes that override those names.
  postgres:
    taskfile: ./tasks/postgres.yml
    vars:
      POSTGRES_PROJECT: '{{.RESTMAIL_PROJECT}}'
      POSTGRES_NETWORK: '{{.RESTMAIL_NETWORK}}'
      POSTGRES_IP: '{{.MAIL3_POSTGRES_IP}}'
      POSTGRES_DB_NAME: '{{.MAIL3_DB_NAME}}'
      POSTGRES_DB_USER: '{{.MAIL3_DB_USER}}'
      POSTGRES_DB_PASS: '{{.MAIL3_DB_PASS}}'

  js-filter:
    taskfile: ./tasks/js-filter.yml
    vars:
      JS_FILTER_PROJECT: '{{.RESTMAIL_PROJECT}}'
      JS_FILTER_NETWORK: '{{.RESTMAIL_NETWORK}}'
      JS_FILTER_IP: '{{.MAIL3_JS_FILTER_IP}}'
      JS_FILTER_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      JS_FILTER_REGISTRY: '{{.RESTMAIL_REGISTRY}}'

  api:
    taskfile: ./tasks/api.yml
    vars:
      API_PROJECT: '{{.RESTMAIL_PROJECT}}'
      API_NETWORK: '{{.RESTMAIL_NETWORK}}'
      API_CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      API_DNS_IP: '{{.RESTMAIL_TESTBED_DNS_IP}}'
      API_IP: '{{.MAIL3_API_IP}}'
      API_PORT: '{{.MAIL3_API_PORT}}'
      API_MODE: dev
      API_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      API_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      API_DB_NAME: '{{.MAIL3_DB_NAME}}'
      API_DB_USER: '{{.MAIL3_DB_USER}}'
      API_DB_PASS: '{{.MAIL3_DB_PASS}}'
      API_JWT_SECRET: '{{.MAIL3_JWT_SECRET}}'
      API_MASTER_KEY: '{{.MAIL3_MASTER_KEY}}'
      API_LOG_LEVEL: '{{.MAIL3_LOG_LEVEL}}'
      API_ENVIRONMENT: '{{.MAIL3_ENVIRONMENT}}'

  smtp-gateway:
    taskfile: ./tasks/smtp-gateway.yml
    vars:
      SMTP_GATEWAY_PROJECT: '{{.RESTMAIL_PROJECT}}'
      SMTP_GATEWAY_NETWORK: '{{.RESTMAIL_NETWORK}}'
      SMTP_GATEWAY_CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      SMTP_GATEWAY_DNS_IP: '{{.RESTMAIL_TESTBED_DNS_IP}}'
      SMTP_GATEWAY_IP: '{{.MAIL3_SMTP_IP}}'
      SMTP_GATEWAY_MAIL3_HOSTNAME: '{{.MAIL3_HOSTNAME}}'
      SMTP_GATEWAY_MODE: dev
      SMTP_GATEWAY_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      SMTP_GATEWAY_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      SMTP_GATEWAY_DB_NAME: '{{.MAIL3_DB_NAME}}'
      SMTP_GATEWAY_DB_USER: '{{.MAIL3_DB_USER}}'
      SMTP_GATEWAY_DB_PASS: '{{.MAIL3_DB_PASS}}'
      SMTP_GATEWAY_PORT_INBOUND: '{{.MAIL3_SMTP_PORT_INBOUND}}'
      SMTP_GATEWAY_PORT_SUBMISSION: '{{.MAIL3_SMTP_PORT_SUBMISSION}}'
      SMTP_GATEWAY_PORT_SUBMISSION_TLS: '{{.MAIL3_SMTP_PORT_SUBMISSION_TLS}}'
      SMTP_GATEWAY_LOG_LEVEL: '{{.MAIL3_LOG_LEVEL}}'
      SMTP_GATEWAY_ENVIRONMENT: '{{.MAIL3_ENVIRONMENT}}'

  imap-gateway:
    taskfile: ./tasks/imap-gateway.yml
    vars:
      IMAP_GATEWAY_PROJECT: '{{.RESTMAIL_PROJECT}}'
      IMAP_GATEWAY_NETWORK: '{{.RESTMAIL_NETWORK}}'
      IMAP_GATEWAY_CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      IMAP_GATEWAY_DNS_IP: '{{.RESTMAIL_TESTBED_DNS_IP}}'
      IMAP_GATEWAY_IP: '{{.MAIL3_IMAP_IP}}'
      IMAP_GATEWAY_MAIL3_HOSTNAME: '{{.MAIL3_HOSTNAME}}'
      IMAP_GATEWAY_MODE: dev
      IMAP_GATEWAY_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      IMAP_GATEWAY_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      IMAP_GATEWAY_DB_NAME: '{{.MAIL3_DB_NAME}}'
      IMAP_GATEWAY_DB_USER: '{{.MAIL3_DB_USER}}'
      IMAP_GATEWAY_DB_PASS: '{{.MAIL3_DB_PASS}}'
      IMAP_GATEWAY_PORT: '{{.MAIL3_IMAP_PORT}}'
      IMAP_GATEWAY_TLS_PORT: '{{.MAIL3_IMAP_TLS_PORT}}'
      IMAP_GATEWAY_LOG_LEVEL: '{{.MAIL3_LOG_LEVEL}}'
      IMAP_GATEWAY_ENVIRONMENT: '{{.MAIL3_ENVIRONMENT}}'
      IMAP_GATEWAY_PROXY_HOST: '{{.RESTMAIL_PROXY_HOST}}'

  pop3-gateway:
    taskfile: ./tasks/pop3-gateway.yml
    vars:
      POP3_GATEWAY_PROJECT: '{{.RESTMAIL_PROJECT}}'
      POP3_GATEWAY_NETWORK: '{{.RESTMAIL_NETWORK}}'
      POP3_GATEWAY_CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      POP3_GATEWAY_DNS_IP: '{{.RESTMAIL_TESTBED_DNS_IP}}'
      POP3_GATEWAY_IP: '{{.MAIL3_POP3_IP}}'
      POP3_GATEWAY_MAIL3_HOSTNAME: '{{.MAIL3_HOSTNAME}}'
      POP3_GATEWAY_MODE: dev
      POP3_GATEWAY_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      POP3_GATEWAY_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      POP3_GATEWAY_DB_NAME: '{{.MAIL3_DB_NAME}}'
      POP3_GATEWAY_DB_USER: '{{.MAIL3_DB_USER}}'
      POP3_GATEWAY_DB_PASS: '{{.MAIL3_DB_PASS}}'
      POP3_PORT: '{{.MAIL3_POP3_PORT}}'
      POP3_TLS_PORT: '{{.MAIL3_POP3_TLS_PORT}}'
      POP3_GATEWAY_LOG_LEVEL: '{{.MAIL3_LOG_LEVEL}}'
      POP3_GATEWAY_ENVIRONMENT: '{{.MAIL3_ENVIRONMENT}}'

  webmail:
    taskfile: ./tasks/webmail.yml
    vars:
      WEBMAIL_PROJECT: '{{.RESTMAIL_PROJECT}}'
      WEBMAIL_NETWORK: '{{.RESTMAIL_NETWORK}}'
      WEBMAIL_IP: '{{.MAIL3_WEBMAIL_IP}}'
      WEBMAIL_MODE: dev
      WEBMAIL_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      WEBMAIL_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      WEBMAIL_PROXY_HOST: '{{.RESTMAIL_PROXY_HOST}}'

  admin:
    taskfile: ./tasks/admin.yml
    vars:
      ADMIN_PROJECT: '{{.RESTMAIL_PROJECT}}'
      ADMIN_NETWORK: '{{.RESTMAIL_NETWORK}}'
      ADMIN_IP: '{{.MAIL3_ADMIN_IP}}'
      ADMIN_MODE: dev
      ADMIN_IMAGE_TAG: '{{.RESTMAIL_IMAGE_TAG}}'
      ADMIN_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      ADMIN_PROXY_HOST: '{{.RESTMAIL_PROXY_HOST}}'

  website:
    taskfile: ./tasks/website.yml
    vars:
      WEBSITE_PROJECT: '{{.RESTMAIL_PROJECT}}'
      WEBSITE_NETWORK: '{{.RESTMAIL_NETWORK}}'
      WEBSITE_IP: '{{.MAIL3_WEBSITE_IP}}'
      WEBSITE_REGISTRY: '{{.RESTMAIL_REGISTRY}}'
      WEBSITE_IMAGE_TAG: latest
      WEBSITE_PROXY_HOST: '{{.RESTMAIL_PROXY_HOST}}'

  monitoring:
    taskfile: ./tasks/monitoring.yml
    vars:
      MONITORING_PROJECT: '{{.RESTMAIL_PROJECT}}'
      MONITORING_NETWORK: '{{.RESTMAIL_NETWORK}}'
      PROMETHEUS_IP: '{{.MONITORING_PROMETHEUS_IP}}'
      GRAFANA_IP: '{{.MONITORING_GRAFANA_IP}}'
      POSTGRES_EXPORTER_IP: '{{.MONITORING_POSTGRES_EXPORTER_IP}}'

  # ── Subprojects (must come last) ────────────────────────
  # Each of these sets PROJECT/IMAGE_TAG to its own value and Task bleeds
  # those into later includes' var resolution. Putting them last keeps
  # the local-service includes above resolving against the parent
  # vars block (PROJECT=rest-mail, IMAGE_TAG=dev).
  testbed:
    taskfile: .workspace/testbed/Taskfile.yml
    dir: .workspace/testbed
    optional: true
    vars:
      PROJECT: testbed
      IMAGE_TAG: 2026.04.28

  mailserver:mail1:
    taskfile: .workspace/reference-mailserver/Taskfile.yml
    dir: .workspace/reference-mailserver
    optional: true
    vars:
      CONFIG: mail1
      HOSTNAME: mail1.test
      MAILNET_NAME: '{{.RESTMAIL_NETWORK}}'
      CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      IMAGE_TAG: 2026.04.28
      POSTGRES_IP: 10.99.0.41
      POSTFIX_IP: 10.99.0.11
      DOVECOT_IP: 10.99.0.111
      RSPAMD_IP: 10.99.0.13
      FAIL2BAN_IP: 10.99.0.14

  mailserver:mail2:
    taskfile: .workspace/reference-mailserver/Taskfile.yml
    dir: .workspace/reference-mailserver
    optional: true
    vars:
      CONFIG: mail2
      HOSTNAME: mail2.test
      MAILNET_NAME: '{{.RESTMAIL_NETWORK}}'
      CERTS_VOLUME: '{{.RESTMAIL_CERTS_VOLUME}}'
      IMAGE_TAG: 2026.04.28
      POSTGRES_IP: 10.99.0.42
      POSTFIX_IP: 10.99.0.12
      DOVECOT_IP: 10.99.0.112
      RSPAMD_IP: 10.99.0.23
      FAIL2BAN_IP: 10.99.0.24

tasks:

  # ════════════════════════════════════════════════════════
  # Build (Go binaries — used for local development without Docker)
  # ════════════════════════════════════════════════════════

  build:
    desc: Build all Go binaries
    deps: [build:api, build:smtp-gateway, build:imap-gateway, build:pop3-gateway, build:console, build:certgen, build:migrate, build:seed]

  build:api:
    desc: Build the REST API server
    cmds:
      - go build -o build/api/api ./cmd/api
    sources:
      - cmd/api/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/api/api

  build:gateways:
    desc: Build all three protocol gateways
    deps: [build:smtp-gateway, build:imap-gateway, build:pop3-gateway]

  build:smtp-gateway:
    desc: Build the SMTP protocol gateway
    cmds:
      - go build -o build/gateways/smtp-gateway ./cmd/smtp-gateway
    sources:
      - cmd/smtp-gateway/**/*.go
      - internal/gateway/smtp/**/*.go
      - internal/gateway/apiclient/**/*.go
      - internal/gateway/queue/**/*.go
      - internal/db/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/smtp-gateway

  build:imap-gateway:
    desc: Build the IMAP protocol gateway
    cmds:
      - go build -o build/gateways/imap-gateway ./cmd/imap-gateway
    sources:
      - cmd/imap-gateway/**/*.go
      - internal/gateway/imap/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/imap-gateway

  build:pop3-gateway:
    desc: Build the POP3 protocol gateway
    cmds:
      - go build -o build/gateways/pop3-gateway ./cmd/pop3-gateway
    sources:
      - cmd/pop3-gateway/**/*.go
      - internal/gateway/pop3/**/*.go
      - internal/gateway/apiclient/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/gateways/pop3-gateway

  build:website:
    desc: Build the website server binary
    cmds:
      - go build -o build/tools/website ./cmd/website
    sources:
      - cmd/website/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/website

  build:console:
    desc: Build the console admin tool (auto-detects OS/arch)
    vars:
      HOST_OS:
        sh: go env GOHOSTOS
      HOST_ARCH:
        sh: go env GOHOSTARCH
    cmds:
      - GOOS={{.HOST_OS}} GOARCH={{.HOST_ARCH}} go build -o build/console/console-{{.HOST_OS}}-{{.HOST_ARCH}} ./cmd/console
      - echo "Built build/console/console-{{.HOST_OS}}-{{.HOST_ARCH}}"
    sources:
      - cmd/console/**/*.go
      - internal/console/**/*.go
      - go.mod
      - go.sum

  build:console:darwin-arm64:
    desc: Cross-compile console for macOS Apple Silicon
    env:
      GOOS: darwin
      GOARCH: arm64
    cmds:
      - go build -o build/console/console-darwin-arm64 ./cmd/console

  build:console:darwin-amd64:
    desc: Cross-compile console for macOS Intel
    env:
      GOOS: darwin
      GOARCH: amd64
    cmds:
      - go build -o build/console/console-darwin-amd64 ./cmd/console

  build:console:linux-arm64:
    desc: Cross-compile console for Linux arm64
    env:
      GOOS: linux
      GOARCH: arm64
    cmds:
      - go build -o build/console/console-linux-arm64 ./cmd/console

  build:console:all:
    desc: Build console for all platforms
    deps: [build:console:darwin-arm64, build:console:darwin-amd64, build:console:linux-arm64, build:console]

  build:tools:
    desc: Build all tool binaries (certgen, migrate, seed, website)
    deps: [build:certgen, build:migrate, build:seed, build:website]

  build:certgen:
    desc: Build the certificate generator
    cmds:
      - go build -o build/tools/certgen ./cmd/certgen
    sources:
      - cmd/certgen/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/certgen

  build:migrate:
    desc: Build the migration runner
    cmds:
      - go build -o build/tools/migrate ./cmd/migrate
    sources:
      - cmd/migrate/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/migrate

  build:seed:
    desc: Build the test data seeder
    cmds:
      - go build -o build/tools/seed ./cmd/seed
    sources:
      - cmd/seed/**/*.go
      - internal/**/*.go
      - go.mod
      - go.sum
    generates:
      - build/tools/seed

  # instantmailcheck moved to its own repo:
  #   https://github.com/rest-mail/instantmailcheck
  # Install via Homebrew:
  #   brew install antimatter-studios/tap/instantmailcheck
  # Or via Go:
  #   go install github.com/rest-mail/instantmailcheck@latest

  # ════════════════════════════════════════════════════════
  # Test
  # ════════════════════════════════════════════════════════

  test:
    desc: Run unit tests
    cmds:
      - go test -race -count=1 ./internal/...

  test:unit:
    desc: Run unit tests (alias for test)
    cmds:
      - go test -race -count=1 ./internal/...

  test:verbose:
    desc: Run unit tests with verbose output
    cmds:
      - go test -race -count=1 -v ./internal/...

  test:coverage:
    desc: Run unit tests with coverage report
    cmds:
      - go test -race -count=1 -coverprofile=coverage.out ./internal/...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report written to coverage.html"

  test:e2e:
    desc: Run e2e tests (requires running containers)
    cmds:
      - go test -race -count=1 -v -timeout 5m ./tests/e2e/...

  test:all:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  # ════════════════════════════════════════════════════════
  # Code quality
  # ════════════════════════════════════════════════════════

  fmt:
    desc: Format Go source code
    cmds:
      - gofmt -w -s .

  vet:
    desc: Run go vet on all packages
    cmds:
      - go vet ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy and verify Go module dependencies
    cmds:
      - go mod tidy
      - go mod verify

  # ════════════════════════════════════════════════════════
  # restmail product stack
  #
  # `restmail:mail3:up` brings up the full mail3.test product stack
  # — postgres, js-filter, api, three protocol gateways, webmail,
  # admin, website. Each individual service is included from
  # tasks/<service>.yml under its own namespace, so `task <svc>:up`,
  # `task <svc>:down`, `task <svc>:logs` etc. are also available.
  # ════════════════════════════════════════════════════════

  restmail:mail3:up:
    desc: Bring up the full restmail product stack for mail3.test
    cmds:
      - task: postgres:up
      - |
        echo "  waiting for postgres to become healthy..."
        for i in $(seq 1 30); do
          status=$(docker inspect -f '{{`{{.State.Health.Status}}`}}' {{.RESTMAIL_PROJECT}}-postgres 2>/dev/null || echo "starting")
          if [ "$status" = "healthy" ]; then
            echo "  postgres healthy"
            break
          fi
          sleep 1
        done
      - task: js-filter:up
      - task: api:up
      - task: health:wait
      - task: db:seed
      - task: smtp-gateway:up
      - task: imap-gateway:up
      - task: pop3-gateway:up
      - task: webmail:up
      - task: admin:up
      - task: website:up
      - |
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  restmail (mail3.test) ready"
        echo ""
        echo "  Website   →  http://localhost/"
        echo "  Webmail   →  http://localhost/webmail"
        echo "  Admin     →  http://localhost/admin"
        echo "  API       →  http://localhost/api"
        echo "  API docs  →  http://localhost/api/docs"
        echo ""
        echo "  Direct (bypass proxy):"
        echo "    API     →  http://localhost:{{.MAIL3_API_PORT}}"
        echo ""
        echo "  task <service>:up|down|restart|logs    drive a single service"
        echo "  task restmail:mail3:down               stop everything"
        echo "  task restmail:mail3:restart            rebuild + recreate"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  restmail:mail3:down:
    desc: Stop the restmail mail3 stack (preserves data volumes)
    cmds:
      - task: website:down
      - task: admin:down
      - task: webmail:down
      - task: pop3-gateway:down
      - task: imap-gateway:down
      - task: smtp-gateway:down
      - task: api:down
      - task: js-filter:down
      - task: postgres:down

  restmail:mail3:restart:
    desc: Stop + recreate the full restmail stack (rebuilds images)
    cmds:
      - task: restmail:mail3:down
      - task: restmail:mail3:up

  restmail:mail3:logs:
    desc: Print available log commands for the restmail mail3 stack
    cmds:
      - |
        echo "Tail logs for individual services:"
        echo "  task postgres:logs"
        echo "  task js-filter:logs"
        echo "  task api:logs"
        echo "  task smtp-gateway:logs"
        echo "  task imap-gateway:logs"
        echo "  task pop3-gateway:logs"
        echo "  task webmail:logs"
        echo "  task admin:logs"
        echo "  task website:logs"

  dev:
    desc: Alias for restmail:mail3:up (legacy name)
    deps: [restmail:mail3:up]

  health:wait:
    desc: Wait for the API health endpoint to respond (up to 60s)
    cmds:
      - |
        echo "  waiting for api health endpoint..."
        for i in $(seq 1 30); do
          if curl -sf http://localhost:{{.MAIL3_API_PORT}}/api/health > /dev/null 2>&1; then
            echo "  api healthy"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: api did not become healthy within 60 seconds." >&2
        exit 1

  ps:
    desc: Show all running rest-mail-* containers
    cmds:
      - docker ps -a --filter "name=^/{{.RESTMAIL_PROJECT}}-"

  # ════════════════════════════════════════════════════════
  # Database
  # ════════════════════════════════════════════════════════

  db:migrate:
    desc: Run database migrations for mail3 (executed inside the api container)
    cmds:
      - docker exec {{.RESTMAIL_PROJECT}}-api go run ./cmd/migrate

  db:seed:
    desc: Seed the mail3 database with test data
    cmds:
      - docker exec {{.RESTMAIL_PROJECT}}-api go run ./cmd/seed

  db:reset:
    desc: Drop the postgres data volume, recreate, then seed (destructive)
    cmds:
      - task: postgres:reset
      - task: db:seed

  db:psql:
    desc: Open a psql shell to the mail3 database
    cmds:
      - task: postgres:psql

  # ════════════════════════════════════════════════════════
  # Subproject bootstrap (clone-only)
  #
  # rest-mail/testbed and rest-mail/reference-mailserver are cloned into
  # .workspace/* (gitignored). Both repos' Taskfiles are pulled in via
  # the `includes:` block at the top of this file, so all their
  # operational tasks (up, down, smoke, dig, ...) flow through
  # automatically once cloned. The clone steps live here because the
  # include can't bootstrap itself — first-run is `task testbed:init`
  # and `task mailserver:init`.
  # ════════════════════════════════════════════════════════

  testbed:init:
    desc: First-run only — clone rest-mail/testbed into .workspace/testbed
    status:
      - test -d .workspace/testbed/.git
    cmds:
      - mkdir -p .workspace
      - git clone git@github.com:rest-mail/testbed.git .workspace/testbed

  mailserver:init:
    desc: First-run only — clone rest-mail/reference-mailserver into .workspace/reference-mailserver
    status:
      - test -d .workspace/reference-mailserver/.git
    cmds:
      - mkdir -p .workspace
      - git clone git@github.com:rest-mail/reference-mailserver.git .workspace/reference-mailserver

  # ════════════════════════════════════════════════════════
  # Utilities
  # ════════════════════════════════════════════════════════

  run:console:
    desc: Run the console admin tool inside the api container
    cmds:
      - docker exec -it -e RESTMAIL_ADMIN_USERNAME=${RESTMAIL_ADMIN_USERNAME:-admin} -e RESTMAIL_ADMIN_PASSWORD=${RESTMAIL_ADMIN_PASSWORD:-admin123!@} {{.RESTMAIL_PROJECT}}-api go run ./cmd/console --api http://localhost:{{.MAIL3_API_PORT}}

  setup:
    desc: Install dependencies, build all binaries, verify toolchain
    cmds:
      - echo "Checking Go..."
      - go version
      - echo "Downloading Go modules..."
      - go mod download
      - echo "Installing webmail dependencies..."
      - cd webmail && npm ci
      - echo "Verifying build..."
      - go build ./...
      - echo "Setup complete."

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/
      - rm -f coverage.out coverage.html

  purge:
    desc: Remove all rest-mail-* containers (does not touch volumes — use restmail:mail3:down + postgres:reset for data)
    cmds:
      - |
        ids=$(docker ps -aq --filter "name=^/{{.RESTMAIL_PROJECT}}-")
        if [ -n "$ids" ]; then
          docker rm -f $ids
        else
          echo "no rest-mail containers to remove"
        fi
