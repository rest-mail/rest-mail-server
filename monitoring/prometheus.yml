global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerting-rules.yml

scrape_configs:
  - job_name: 'restmail-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  - job_name: 'restmail-smtp'
    static_configs:
      - targets: ['smtp-gateway:9090']
    metrics_path: /metrics

  - job_name: 'restmail-imap'
    static_configs:
      - targets: ['imap-gateway:9090']
    metrics_path: /metrics

  - job_name: 'restmail-pop3'
    static_configs:
      - targets: ['pop3-gateway:9090']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
