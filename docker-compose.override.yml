# Development overrides — hot reload for all services.
# Automatically merged with docker-compose.yml by docker compose.

services:
  # ─── API: air hot reload ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - .:/app
      - /app/tmp

  # ─── Webmail: Vite HMR ───────────────────────────────────────────────
  webmail:
    build:
      context: ./webmail
      target: dev
    ports:
      - "3001:3000"
    volumes:
      - ./webmail:/app
      - /app/node_modules
    environment:
      # Tells vite.config.ts which host to proxy /api requests to
      VITE_PROXY_TARGET: http://api:8080

  # ─── SMTP Gateway: air hot reload ────────────────────────────────────
  smtp-gateway:
    build:
      context: .
      dockerfile: docker/smtp-gateway/Dockerfile
      target: dev
    volumes:
      - .:/app
      - /app/tmp

  # ─── IMAP Gateway: air hot reload ────────────────────────────────────
  imap-gateway:
    build:
      context: .
      dockerfile: docker/imap-gateway/Dockerfile
      target: dev
    volumes:
      - .:/app
      - /app/tmp

  # ─── POP3 Gateway: air hot reload ────────────────────────────────────
  pop3-gateway:
    build:
      context: .
      dockerfile: docker/pop3-gateway/Dockerfile
      target: dev
    volumes:
      - .:/app
      - /app/tmp
