server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA under the configured base path.
    # __BASE_PATH__ is replaced at container start by docker-entrypoint.sh.
    # ^~ prevents regex locations from overriding this prefix match.
    # alias strips the location prefix when resolving files, so
    # /webmail/assets/x.js resolves to /usr/share/nginx/html/assets/x.js.
    location ^~ __BASE_PATH__ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ __BASE_PATH__index.html;
    }

    # Redirect base path without trailing slash to add it
    location = __BASE_PATH_NOSLASH__ {
        return 301 __BASE_PATH__;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
