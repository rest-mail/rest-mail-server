services:
  webmail:
    build:
      context: .
      target: prod
      args:
        NGINX_BASE_PATH: /webmail
    restart: unless-stopped
    environment:
      NGINX_BASE_PATH: /webmail
      VITE_API_URL: http://restmail.localhost/api/v1
    labels:
      - docker-proxy.webmail.host=restmail.localhost
      - docker-proxy.webmail.port=80
      - docker-proxy.webmail.path=/webmail
    networks:
      mailnet:
        ipv4_address: 10.99.0.21

networks:
  mailnet:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-rest-mail}_mailnet
