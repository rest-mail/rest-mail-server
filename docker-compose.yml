networks:
  mailnet:
    external: true
    name: ${COMPOSE_PROJECT_NAME:-rest-mail}_mailnet

volumes:
  postgres-mail1-data:
  postgres-mail2-data:
  postgres-mail3-data:
  mail1-maildir:
  mail2-maildir:
  mail3-attachments:
  certs:
  gateway-logs:

services:
  # ─── Certificate Generator (init container) ──────────────────────────
  certgen:
    build: ./docker/certs
    volumes:
      - certs:/certs
    networks:
      mailnet:
        ipv4_address: 172.20.0.99

  # ─── DNS Server ──────────────────────────────────────────────────────
  dnsmasq:
    build: ./docker/dnsmasq
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      mailnet:
        ipv4_address: 172.20.0.3

  # ─── PostgreSQL for mail1.test (traditional) ────────────────────────
  postgres-mail1:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restmail
      POSTGRES_USER: restmail
      POSTGRES_PASSWORD: restmail
    volumes:
      - postgres-mail1-data:/var/lib/postgresql/data
      - ./docker/postgres/init-traditional.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/postgres/seed-mail1.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restmail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mailnet:
        ipv4_address: 172.20.0.41

  # ─── PostgreSQL for mail2.test (traditional) ────────────────────────
  postgres-mail2:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restmail
      POSTGRES_USER: restmail
      POSTGRES_PASSWORD: restmail
    volumes:
      - postgres-mail2-data:/var/lib/postgresql/data
      - ./docker/postgres/init-traditional.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/postgres/seed-mail2.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restmail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mailnet:
        ipv4_address: 172.20.0.42

  # ─── PostgreSQL for mail3.test (REST API + gateways) ────────────────
  postgres-mail3:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: restmail
      POSTGRES_USER: restmail
      POSTGRES_PASSWORD: restmail
    volumes:
      - postgres-mail3-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restmail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mailnet:
        ipv4_address: 172.20.0.43

  # ─── JS Filter Sidecar ─────────────────────────────────────────────
  js-filter:
    build:
      context: ./docker/js-filter-sidecar
    restart: unless-stopped
    networks:
      mailnet:
        ipv4_address: 172.20.0.22
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3100 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Go REST API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    labels:
      - docker-proxy.api.host=restmail.localhost
      - docker-proxy.api.port=8080
      - docker-proxy.api.path=/api
    environment:
      DB_HOST: postgres-mail3
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      API_PORT: "8080"
      JWT_SECRET: dev-secret-change-in-production
      MASTER_KEY: dev-master-key-change-in-production
      ENVIRONMENT: development
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    volumes:
      - certs:/certs:ro
      - mail3-attachments:/attachments
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.20

  # ─── SMTP Gateway (mail3.test) ──────────────────────────────────────
  smtp-gateway:
    build:
      context: .
      dockerfile: docker/smtp-gateway/Dockerfile
      target: prod
    restart: unless-stopped
    hostname: mail3.test
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      DB_HOST: postgres-mail3
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      SMTP_PORT_INBOUND: "25"
      SMTP_PORT_SUBMISSION: "587"
      SMTP_PORT_SUBMISSION_TLS: "465"
      QUEUE_WORKERS: "4"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.13

  # ─── IMAP Gateway (mail3.test) ──────────────────────────────────────
  imap-gateway:
    build:
      context: .
      dockerfile: docker/imap-gateway/Dockerfile
      target: prod
    restart: unless-stopped
    hostname: mail3.test
    labels:
      - docker-proxy.imaps.proto=tcp
      - docker-proxy.imaps.port=993
    ports:
      - "143:143"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      DB_HOST: postgres-mail3
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      IMAP_PORT: "143"
      IMAP_TLS_PORT: "993"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 143 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.15

  # ─── POP3 Gateway (mail3.test) ──────────────────────────────────────
  pop3-gateway:
    build:
      context: .
      dockerfile: docker/pop3-gateway/Dockerfile
      target: prod
    restart: unless-stopped
    hostname: mail3.test
    ports:
      - "110:110"
      - "995:995"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      DB_HOST: postgres-mail3
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      POP3_PORT: "110"
      POP3_TLS_PORT: "995"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 110 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.16

  # ─── Postfix mail1.test ─────────────────────────────────────────────
  postfix-mail1:
    build: ./docker/postfix
    restart: unless-stopped
    hostname: mail1.test
    environment:
      MAIL_DOMAIN: mail1.test
      MAIL_HOSTNAME: mail1.test
      DB_HOST: postgres-mail1
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      DOVECOT_HOST: dovecot-mail1
      TLS_CERT_PATH: /certs/mail1.test.crt
      TLS_KEY_PATH: /certs/mail1.test.key
    volumes:
      - certs:/certs:ro
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.11

  # ─── Dovecot mail1.test ─────────────────────────────────────────────
  dovecot-mail1:
    build: ./docker/dovecot
    restart: unless-stopped
    hostname: mail1.test
    environment:
      MAIL_DOMAIN: mail1.test
      DB_HOST: postgres-mail1
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail1.test.crt
      TLS_KEY_PATH: /certs/mail1.test.key
    volumes:
      - certs:/certs:ro
      - mail1-maildir:/var/mail/vhosts
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.14

  # ─── Postfix mail2.test ─────────────────────────────────────────────
  postfix-mail2:
    build: ./docker/postfix
    restart: unless-stopped
    hostname: mail2.test
    environment:
      MAIL_DOMAIN: mail2.test
      MAIL_HOSTNAME: mail2.test
      DB_HOST: postgres-mail2
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      DOVECOT_HOST: dovecot-mail2
      TLS_CERT_PATH: /certs/mail2.test.crt
      TLS_KEY_PATH: /certs/mail2.test.key
    volumes:
      - certs:/certs:ro
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.12

  # ─── Dovecot mail2.test ─────────────────────────────────────────────
  dovecot-mail2:
    build: ./docker/dovecot
    restart: unless-stopped
    hostname: mail2.test
    environment:
      MAIL_DOMAIN: mail2.test
      DB_HOST: postgres-mail2
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail2.test.crt
      TLS_KEY_PATH: /certs/mail2.test.key
    volumes:
      - certs:/certs:ro
      - mail2-maildir:/var/mail/vhosts
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.17

  # ─── rspamd (spam scanning) ─────────────────────────────────────────
  rspamd:
    image: rspamd/rspamd:latest
    profiles: ["scanning"]
    restart: unless-stopped
    volumes:
      - ./docker/rspamd/local.d:/etc/rspamd/local.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11333/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.23

  # ─── ClamAV (virus scanning) ──────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    profiles: ["scanning"]
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      mailnet:
        ipv4_address: 172.20.0.24

  # ─── ClamAV REST proxy ────────────────────────────────────────────
  clamav-rest:
    image: benzino77/clamav-rest-api:latest
    profiles: ["scanning"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CLAMD_IP: clamav
      CLAMD_PORT: "3310"
      APP_PORT: "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.25

  # ─── Fail2ban Sidecar ────────────────────────────────────────────────
  fail2ban:
    build:
      context: ./docker/fail2ban
    profiles: ["security"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - gateway-logs:/var/log/restmail:ro
    restart: unless-stopped

