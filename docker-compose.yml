version: "3.8"

networks:
  mailnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  mail1-maildir:
  mail2-maildir:
  mail3-attachments:
  certs:
  gateway-logs:
  prometheus-data:
  grafana-data:

services:
  # ─── Certificate Generator (init container) ──────────────────────────
  certgen:
    build: ./docker/certs
    volumes:
      - certs:/certs
    networks:
      mailnet:
        ipv4_address: 172.20.0.99

  # ─── DNS Server ──────────────────────────────────────────────────────
  dnsmasq:
    build: ./docker/dnsmasq
    container_name: dnsmasq
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      mailnet:
        ipv4_address: 172.20.0.3
    depends_on:
      certgen:
        condition: service_completed_successfully

  # ─── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restmail
      POSTGRES_USER: restmail
      POSTGRES_PASSWORD: restmail
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restmail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      mailnet:
        ipv4_address: 172.20.0.2

  # ─── JS Filter Sidecar ─────────────────────────────────────────────
  js-filter:
    build:
      context: ./docker/js-filter-sidecar
    container_name: restmail-js-filter
    restart: unless-stopped
    networks:
      mailnet:
        ipv4_address: 172.20.0.22
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3100 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Go REST API ────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      API_PORT: "8080"
      JWT_SECRET: dev-secret-change-in-production
      MASTER_KEY: dev-master-key-change-in-production
      ENVIRONMENT: development
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    volumes:
      - certs:/certs:ro
      - mail3-attachments:/attachments
    depends_on:
      postgres:
        condition: service_healthy
      dnsmasq:
        condition: service_started
      js-filter:
        condition: service_started
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.20

  # ─── React Webmail Frontend ────────────────────────────────────────
  webmail:
    build: ./webmail
    container_name: webmail
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_started
    networks:
      mailnet:
        ipv4_address: 172.20.0.21

  # ─── SMTP Gateway (mail3.test) ──────────────────────────────────────
  smtp-gateway:
    build:
      context: .
      dockerfile: docker/smtp-gateway/Dockerfile
    container_name: smtp-gateway
    restart: unless-stopped
    hostname: mail3.test
    ports:
      - "25:25"
      - "587:587"
      - "465:465"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      SMTP_PORT_INBOUND: "25"
      SMTP_PORT_SUBMISSION: "587"
      SMTP_PORT_SUBMISSION_TLS: "465"
      QUEUE_WORKERS: "4"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    depends_on:
      api:
        condition: service_started
      postgres:
        condition: service_healthy
      dnsmasq:
        condition: service_started
      certgen:
        condition: service_completed_successfully
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.13

  # ─── IMAP Gateway (mail3.test) ──────────────────────────────────────
  imap-gateway:
    build:
      context: .
      dockerfile: docker/imap-gateway/Dockerfile
    container_name: imap-gateway
    restart: unless-stopped
    hostname: mail3.test
    ports:
      - "143:143"
      - "993:993"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      IMAP_PORT: "143"
      IMAP_TLS_PORT: "993"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    depends_on:
      api:
        condition: service_started
      certgen:
        condition: service_completed_successfully
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 143 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.15

  # ─── POP3 Gateway (mail3.test) ──────────────────────────────────────
  pop3-gateway:
    build:
      context: .
      dockerfile: docker/pop3-gateway/Dockerfile
    container_name: pop3-gateway
    restart: unless-stopped
    hostname: mail3.test
    ports:
      - "110:110"
      - "995:995"
    environment:
      GATEWAY_HOSTNAME: mail3.test
      API_BASE_URL: http://api:8080
      TLS_CERT_PATH: /certs/mail3.test.crt
      TLS_KEY_PATH: /certs/mail3.test.key
      POP3_PORT: "110"
      POP3_TLS_PORT: "995"
      LOG_LEVEL: debug
      ENVIRONMENT: development
    volumes:
      - certs:/certs:ro
    depends_on:
      api:
        condition: service_started
      certgen:
        condition: service_completed_successfully
    dns:
      - 172.20.0.3
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 110 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.16

  # ─── Postfix mail1.test ─────────────────────────────────────────────
  postfix-mail1:
    build: ./docker/postfix
    container_name: postfix-mail1
    restart: unless-stopped
    hostname: mail1.test
    environment:
      MAIL_DOMAIN: mail1.test
      MAIL_HOSTNAME: mail1.test
      DB_HOST: postgres
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      DOVECOT_HOST: dovecot-mail1
      TLS_CERT_PATH: /certs/mail1.test.crt
      TLS_KEY_PATH: /certs/mail1.test.key
    volumes:
      - certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      dnsmasq:
        condition: service_started
      certgen:
        condition: service_completed_successfully
      dovecot-mail1:
        condition: service_started
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.11

  # ─── Dovecot mail1.test ─────────────────────────────────────────────
  dovecot-mail1:
    build: ./docker/dovecot
    container_name: dovecot-mail1
    restart: unless-stopped
    hostname: mail1.test
    environment:
      MAIL_DOMAIN: mail1.test
      DB_HOST: postgres
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail1.test.crt
      TLS_KEY_PATH: /certs/mail1.test.key
    volumes:
      - certs:/certs:ro
      - mail1-maildir:/var/mail/vhosts
    depends_on:
      postgres:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.14

  # ─── Postfix mail2.test ─────────────────────────────────────────────
  postfix-mail2:
    build: ./docker/postfix
    container_name: postfix-mail2
    restart: unless-stopped
    hostname: mail2.test
    environment:
      MAIL_DOMAIN: mail2.test
      MAIL_HOSTNAME: mail2.test
      DB_HOST: postgres
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      DOVECOT_HOST: dovecot-mail2
      TLS_CERT_PATH: /certs/mail2.test.crt
      TLS_KEY_PATH: /certs/mail2.test.key
    volumes:
      - certs:/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      dnsmasq:
        condition: service_started
      certgen:
        condition: service_completed_successfully
      dovecot-mail2:
        condition: service_started
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.12

  # ─── Dovecot mail2.test ─────────────────────────────────────────────
  dovecot-mail2:
    build: ./docker/dovecot
    container_name: dovecot-mail2
    restart: unless-stopped
    hostname: mail2.test
    environment:
      MAIL_DOMAIN: mail2.test
      DB_HOST: postgres
      DB_NAME: restmail
      DB_USER: restmail
      DB_PASS: restmail
      TLS_CERT_PATH: /certs/mail2.test.crt
      TLS_KEY_PATH: /certs/mail2.test.key
    volumes:
      - certs:/certs:ro
      - mail2-maildir:/var/mail/vhosts
    depends_on:
      postgres:
        condition: service_healthy
      certgen:
        condition: service_completed_successfully
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.17

  # ─── Project Website ───────────────────────────────────────────────
  website:
    image: nginx:alpine
    container_name: website
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./website:/usr/share/nginx/html:ro
    networks:
      mailnet:
        ipv4_address: 172.20.0.26

  # ─── rspamd (spam scanning) ─────────────────────────────────────────
  rspamd:
    image: rspamd/rspamd:latest
    container_name: rspamd
    profiles: ["scanning"]
    restart: unless-stopped
    volumes:
      - ./docker/rspamd/local.d:/etc/rspamd/local.d:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11333/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.23

  # ─── ClamAV (virus scanning) ──────────────────────────────────────
  clamav:
    image: clamav/clamav:stable
    container_name: clamav
    profiles: ["scanning"]
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      mailnet:
        ipv4_address: 172.20.0.24

  # ─── ClamAV REST proxy ────────────────────────────────────────────
  clamav-rest:
    image: benzino77/clamav-rest-api:latest
    container_name: clamav-rest
    profiles: ["scanning"]
    restart: unless-stopped
    environment:
      NODE_ENV: production
      CLAMD_IP: clamav
      CLAMD_PORT: "3310"
      APP_PORT: "3000"
    depends_on:
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/v1/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      mailnet:
        ipv4_address: 172.20.0.25

  # ─── Fail2ban Sidecar ────────────────────────────────────────────────
  fail2ban:
    build:
      context: ./docker/fail2ban
    profiles: ["security"]
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - gateway-logs:/var/log/restmail:ro
    restart: unless-stopped

  # ─── Prometheus ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      api:
        condition: service_started
    dns:
      - 172.20.0.3
    networks:
      mailnet:
        ipv4_address: 172.20.0.30

  # ─── Grafana ───────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: restmail
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      mailnet:
        ipv4_address: 172.20.0.31

  # ─── PostgreSQL Exporter ───────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://restmail:restmail@postgres:5432/restmail?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      mailnet:
        ipv4_address: 172.20.0.32
